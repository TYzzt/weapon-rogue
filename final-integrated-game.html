<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - Steam版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e6e6e6;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            display: block;
            border-radius: 12px;
        }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #stats {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #4a4a8a;
            font-size: 15px;
            line-height: 1.8;
            backdrop-filter: blur(5px);
        }

        #stats div {
            margin: 5px 0;
        }

        #start-screen, #game-over, #pause-menu, #settings-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #4cc9f0;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            min-width: 500px;
            box-shadow: 0 0 40px rgba(76, 201, 240, 0.3);
        }

        h1 {
            color: #4cc9f0;
            margin-bottom: 20px;
            font-size: 36px;
            text-shadow: 0 0 15px rgba(76, 201, 240, 0.5);
        }

        h2 {
            color: #f72585;
            margin-bottom: 20px;
            font-size: 28px;
        }

        p {
            margin: 15px 0;
            line-height: 1.6;
            font-size: 16px;
        }

        .description {
            font-size: 18px;
            color: #a9d6e5;
            margin: 20px 0 30px;
            line-height: 1.7;
        }

        button {
            background: linear-gradient(135deg, #4361ee 0%, #3a0ca3 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            min-width: 180px;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.6);
            background: linear-gradient(135deg, #3a0ca3 0%, #4361ee 100%);
        }

        button.secondary {
            background: linear-gradient(135deg, #6a6a8f 0%, #4a4a6a 100%);
        }

        button.secondary:hover {
            background: linear-gradient(135deg, #4a4a6a 0%, #6a6a8f 100%);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
        }

        .menu-button {
            width: 100%;
            max-width: 300px;
            padding: 18px;
            font-size: 18px;
        }

        .menu-button.primary {
            background: linear-gradient(135deg, #f72585 0%, #b5179e 100%);
        }

        .menu-button.primary:hover {
            background: linear-gradient(135deg, #b5179e 0%, #f72585 100%);
        }

        .hidden {
            display: none !important;
        }

        .setting-option {
            margin: 15px 0;
            text-align: left;
        }

        .setting-option label {
            display: flex;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
        }

        .setting-option input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.3);
        }

        .setting-option select {
            margin-left: 15px;
            padding: 8px 15px;
            border-radius: 8px;
            background: #2d2d44;
            color: white;
            border: 1px solid #4a4a6a;
            font-size: 16px;
        }

        .game-stats {
            background: rgba(30, 30, 50, 0.7);
            padding: 20px;
            border-radius: 12px;
            margin: 25px 0;
            border: 1px solid #4a4a6a;
        }

        .game-stats p {
            font-size: 18px;
            margin: 10px 0;
        }

        #achievements-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .achievement-item {
            background: rgba(40, 40, 70, 0.6);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #4ade80;
        }

        .achievement-unlocked {
            border-left-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .achievement-locked {
            border-left-color: #94a3b8;
            background: rgba(148, 163, 184, 0.1);
        }

        .skill-display {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .skill-slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .skill-cooldown {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 0, 0, 0.6);
            height: 0;
            border-radius: 0 0 8px 8px;
        }

        #combat-log {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #4a4a6a;
            font-size: 14px;
            z-index: 5;
        }

        .log-entry {
            margin: 5px 0;
            padding: 3px;
            animation: fadeInOut 3s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .weapon-get { color: #4ade80; }
        .enemy-death { color: #f87171; }
        .level-up { color: #60a5fa; }
        .combo { color: #fbbf24; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ <span id="health-label">生命</span>: <span id="hp">120</span>/<span id="maxHp">120</span></div>
                <div>⚔️ <span id="weapon-label">武器</span>: <span id="weapon">-</span></div>
                <div>🏆 <span id="level-label">关卡</span>: <span id="level">1</span></div>
                <div>💀 <span id="kills-label">击杀</span>: <span id="kills">0</span></div>
                <div>⚡ <span id="combo-label">连击</span>: <span id="combo">0</span></div>
                <div>💎 <span id="score-label">分数</span>: <span id="score">0</span></div>
            </div>

            <div id="combat-log"></div>
        </div>

        <div class="skill-display">
            <div class="skill-slot">Q<br><span id="skill-q-cooldown">0</span>s</div>
            <div class="skill-slot">W<br><span id="skill-w-cooldown">0</span>s</div>
            <div class="skill-slot">E<br><span id="skill-e-cooldown">0</span>s</div>
            <div class="skill-slot">R<br><span id="skill-r-cooldown">0</span>s</div>
        </div>

        <div id="start-screen">
            <h1>🗡️ <span id="title-text">武器替换者</span></h1>
            <p class="description" id="description-text">
                敌人掉落的武器<strong>必定替换</strong>你当前的武器<br>
                这可能是好事，也可能是灾难...<br><br>
                收集药水和遗物来改变命运
            </p>
            <div class="menu-buttons">
                <button id="start-btn" class="menu-button primary"><span id="start-button-text">🎮 开始游戏</span></button>
                <button id="continue-btn" class="menu-button secondary hidden"><span id="continue-button-text">⏱️ 继续游戏</span></button>
                <button id="achievements-btn" class="menu-button"><span id="achievements-button-text">🏆 成就</span></button>
                <button id="settings-btn" class="menu-button"><span id="settings-button-text">⚙️ 设置</span></button>
                <button id="tutorial-btn" class="menu-button"><span id="tutorial-button-text">📚 教程</span></button>
            </div>
        </div>

        <div id="game-over" class="hidden">
            <h2 id="game-over-text">💥 游戏结束</h2>
            <div class="game-stats">
                <p id="final-level-text">你到达了第 <span id="final-level">0</span> 关</p>
                <p id="final-kills-text">击败了 <span id="final-kills">0</span> 个敌人</p>
                <p id="final-score-text">最终得分: <span id="final-score">0</span></p>
                <p id="max-combo-text">最高连击: <span id="max-combo">0</span></p>
            </div>
            <div class="menu-buttons">
                <button id="restart-btn" class="menu-button primary"><span id="restart-button-text">🔄 重新开始</span></button>
                <button id="main-menu-btn" class="menu-button secondary"><span id="main-menu-button-text">🏠 返回主菜单</span></button>
            </div>
        </div>

        <div id="pause-menu" class="hidden">
            <h2 id="pause-text">⏸️ 暂停</h2>
            <div class="menu-buttons">
                <button id="continue-game-btn" class="menu-button primary"><span id="continue-button-text">▶️ 继续游戏</span></button>
                <button id="restart-pause-btn" class="menu-button"><span id="restart-button-text">🔄 重新开始</span></button>
                <button id="pause-settings-btn" class="menu-button"><span id="settings-button-text">⚙️ 设置</span></button>
                <button id="pause-achievements-btn" class="menu-button"><span id="achievements-button-text">🏆 成就</span></button>
                <button id="pause-main-menu-btn" class="menu-button secondary"><span id="main-menu-button-text">🏠 返回主菜单</span></button>
            </div>
        </div>

        <div id="settings-menu" class="hidden">
            <h2 id="settings-text">⚙️ 设置</h2>
            <div class="settings-options">
                <div class="setting-option">
                    <label>
                        <input type="checkbox" id="sound-enabled" checked>
                        <span id="sound-enabled-text">🔊 音效开启</span>
                    </label>
                </div>
                <div class="setting-option">
                    <label>
                        <input type="checkbox" id="music-enabled" checked>
                        <span id="music-enabled-text">🎵 音乐开启</span>
                    </label>
                </div>
                <div class="setting-option">
                    <label>
                        <span id="difficulty-text">🎯 难度:</span>
                        <select id="difficulty-select">
                            <option value="easy" id="easy-difficulty">🐣 简单</option>
                            <option value="normal" selected id="normal-difficulty">🎮 普通</option>
                            <option value="hard" id="hard-difficulty">💀 困难</option>
                        </select>
                    </label>
                </div>
                <div class="setting-option">
                    <label>
                        <span id="language-text">🌐 语言:</span>
                        <select id="language-select">
                            <option value="zh" id="chinese-lang">🇨🇳 中文</option>
                            <option value="en" id="english-lang">🇺🇸 English</option>
                        </select>
                    </label>
                </div>
                <div class="setting-option">
                    <label>
                        <input type="checkbox" id="controller-enabled">
                        <span id="controller-enabled-text">🎮 手柄支持</span>
                    </label>
                </div>
            </div>
            <div class="menu-buttons">
                <button id="back-to-pause" class="menu-button secondary"><span id="back-to-pause-text">↩️ 返回暂停菜单</span></button>
                <button id="back-to-main" class="menu-button secondary"><span id="back-to-main-text">🏠 返回主菜单</span></button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 国际化系统 ====================
        const LANGUAGES = {
            zh: {
                title: "武器替换者",
                description: "敌人掉落的武器<strong>必定替换</strong>你当前的武器<br>这可能是好事，也可能是灾难...<br><br>收集药水和遗物来改变命运",
                startButton: "🎮 开始游戏",
                achievementsButton: "🏆 成就",
                restartButton: "🔄 重新开始",
                continueButton: "▶️ 继续游戏",
                settingsButton: "⚙️ 设置",
                mainMenuButton: "🏠 返回主菜单",
                backToPauseButton: "↩️ 返回暂停菜单",
                gameOver: "💥 游戏结束",
                finalLevel: "你到达了第",
                finalKills: "击败了",
                finalScore: "最终得分: ",
                healthBar: "生命",
                weapon: "武器",
                level: "关卡",
                goal: "目标",
                kills: "击杀",
                combo: "连击",
                score: "分数",
                buffs: "BUFF",
                inventory: "背包",
                potions: "药水",
                relics: "遗物"
            },
            en: {
                title: "Weapon Rogue",
                description: "<strong>Enemies' weapons will definitely replace</strong> your current weapon<br>This could be good or a disaster...<br><br>Collect potions and relics to change your fate",
                startButton: "🎮 Start Game",
                achievementsButton: "🏆 Achievements",
                restartButton: "🔄 Restart",
                continueButton: "▶️ Continue",
                settingsButton: "⚙️ Settings",
                mainMenuButton: "🏠 Main Menu",
                backToPauseButton: "↩️ Back to Pause",
                gameOver: "💥 Game Over",
                finalLevel: "You reached level",
                finalKills: "Defeated",
                finalScore: "Final Score: ",
                healthBar: "Health",
                weapon: "Weapon",
                level: "Level",
                goal: "Goal",
                kills: "Kills",
                combo: "Combo",
                score: "Score",
                buffs: "BUFFS",
                inventory: "Inventory",
                potions: "Potions",
                relics: "Relics"
            }
        };

        let currentLanguage = localStorage.getItem("language") || "zh";
        function t(key) {
            const lang = LANGUAGES[currentLanguage];
            if (lang && lang[key]) {
                return lang[key];
            }
            return key;
        }

        function updateUIText() {
            document.title = t('title');
            document.getElementById("title-text").innerHTML = t("title");
            document.getElementById("description-text").innerHTML = t("description");
            document.getElementById("start-button-text").textContent = t("startButton");
            document.getElementById("achievements-button-text").textContent = t("achievementsButton");
            document.getElementById("settings-button-text").textContent = t("settingsButton");
            document.getElementById("tutorial-button-text").textContent = "📚 " + t("tutorial");
            document.getElementById("game-over-text").textContent = t("gameOver");
            document.getElementById("final-level-text").innerHTML = `${t("finalLevel")} <span id="final-level">0</span>`;
            document.getElementById("final-kills-text").innerHTML = `${t("finalKills")} <span id="final-kills">0</span> ${t("kills")}`;
            document.getElementById("final-score-text").innerHTML = `${t("finalScore")}<span id="final-score">0</span>`;
            document.getElementById("restart-button-text").textContent = t("restartButton");
            document.getElementById("main-menu-button-text").textContent = t("mainMenuButton");
            document.getElementById("pause-text").textContent = t("gameOver");
            document.getElementById("continue-button-text").textContent = t("continueButton");
            document.getElementById("settings-text").textContent = t("settingsButton");
            document.getElementById("sound-enabled-text").textContent = `🔊 ${t("soundEnabled")}`;
            document.getElementById("music-enabled-text").textContent = `🎵 ${t("musicEnabled")}`;
            document.getElementById("difficulty-text").textContent = `🎯 ${t("difficulty")}`;
            document.getElementById("language-text").textContent = `🌐 ${t("language")}`;
            document.getElementById("back-to-pause-text").textContent = t("backToPauseButton");
            document.getElementById("back-to-main-text").textContent = t("mainMenuButton");

            // 更新难度选项文本
            document.getElementById("easy-difficulty").textContent = `🐣 ${t("easy")}`;
            document.getElementById("normal-difficulty").textContent = `🎮 ${t("normal")}`;
            document.getElementById("hard-difficulty").textContent = `💀 ${t("hard")}`;

            // 更新统计标签
            document.getElementById("health-label").textContent = t("healthBar");
            document.getElementById("weapon-label").textContent = t("weapon");
            document.getElementById("level-label").textContent = t("level");
            document.getElementById("kills-label").textContent = t("kills");
            document.getElementById("combo-label").textContent = t("combo");
            document.getElementById("score-label").textContent = t("score");
        }

        // ==================== 音效系统 ====================
        class AudioManager {
            constructor() {
                this.enabled = localStorage.getItem('soundEnabled') !== 'false';
                this.audioContext = null;
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn('Web Audio API not supported');
                }
            }

            playSound(type) {
                if (!this.enabled || !this.audioContext) return;

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                switch(type) {
                    case 'pickup':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(800, this.audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                        break;
                    case 'hit':
                        oscillator.type = 'square';
                        oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                        break;
                    case 'levelup':
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(523.25, this.audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                        setTimeout(() => {
                            oscillator.frequency.setValueAtTime(659.25, this.audioContext.currentTime + 0.1);
                        }, 100);
                        setTimeout(() => {
                            oscillator.frequency.setValueAtTime(783.99, this.audioContext.currentTime + 0.2);
                        }, 200);
                        break;
                    default:
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(500, this.audioContext.currentTime);
                        gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                }

                gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + 0.3);

                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.3);
            }

            toggle() {
                this.enabled = !this.enabled;
                localStorage.setItem('soundEnabled', this.enabled);
            }
        }

        // ==================== 存档系统 ====================
        class SaveManager {
            constructor() {
                this.saveKey = 'weaponRogueSave';
            }

            save(data) {
                try {
                    const saveData = {
                        ...data,
                        timestamp: Date.now(),
                        version: '1.2'
                    };
                    localStorage.setItem(this.saveKey, JSON.stringify(saveData));
                    console.log('游戏进度已保存');
                    this.showCombatLog('💾 进度已保存', 'weapon-get');
                    return true;
                } catch (error) {
                    console.error('保存失败:', error);
                    return false;
                }
            }

            load() {
                try {
                    const saveDataStr = localStorage.getItem(this.saveKey);
                    if (!saveDataStr) return null;

                    const saveData = JSON.parse(saveDataStr);
                    console.log('游戏进度已加载');
                    this.showCombatLog('📂 进度已加载', 'weapon-get');
                    return saveData;
                } catch (error) {
                    console.error('加载失败:', error);
                    return null;
                }
            }

            clear() {
                localStorage.removeItem(this.saveKey);
            }

            showCombatLog(message, type = '') {
                const logDiv = document.getElementById('combat-log');
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry ${type}`;
                logEntry.textContent = message;
                logDiv.prepend(logEntry);

                // 只保留最近的10条消息
                while (logDiv.children.length > 10) {
                    logDiv.removeChild(logDiv.lastChild);
                }

                // 自动移除旧消息
                setTimeout(() => {
                    if (logDiv.contains(logEntry)) {
                        logDiv.removeChild(logEntry);
                    }
                }, 3000);
            }
        }

        // ==================== 成就系统 ====================
        class AchievementSystem {
            constructor() {
                this.achievements = JSON.parse(localStorage.getItem('achievements')) || {};
                this.achievementList = [
                    { id: 'first_blood', name: '第一滴血', description: '击杀第一个敌人', condition: (stats) => stats.kills >= 1 },
                    { id: 'killing_spree', name: '大开杀戒', description: '击杀10个敌人', condition: (stats) => stats.kills >= 10 },
                    { id: 'monster_hunter', name: '怪物猎人', description: '击杀50个敌人', condition: (stats) => stats.kills >= 50 },
                    { id: 'level_5', name: '登堂入室', description: '到达第5关', condition: (stats) => stats.level >= 5 },
                    { id: 'level_10', name: '探索者', description: '到达第10关', condition: (stats) => stats.level >= 10 },
                    { id: 'combo_5', name: '连击入门', description: '达成5连击', condition: (stats) => stats.max_combo >= 5 },
                    { id: 'combo_10', name: '连击专家', description: '达成10连击', condition: (stats) => stats.max_combo >= 10 },
                    { id: 'high_score', name: '高分达人', description: '单局得分超过1000', condition: (stats) => stats.score >= 1000 }
                ];
            }

            checkAchievements(stats) {
                let newAchievements = [];

                for (const achievement of this.achievementList) {
                    if (!this.achievements[achievement.id] && achievement.condition(stats)) {
                        this.unlock(achievement.id);
                        newAchievements.push(achievement);
                    }
                }

                if (newAchievements.length > 0) {
                    this.showCombatLog(`🎉 解锁成就: ${newAchievements.map(a => a.name).join(', ')}`, 'level-up');
                }

                return newAchievements;
            }

            unlock(id) {
                if (!this.achievements[id]) {
                    this.achievements[id] = { unlocked: true, timestamp: Date.now() };
                    this.save();
                }
            }

            save() {
                localStorage.setItem('achievements', JSON.stringify(this.achievements));
            }

            getUnlockedCount() {
                return Object.values(this.achievements).filter(a => a.unlocked).length;
            }

            getTotalCount() {
                return this.achievementList.length;
            }
        }

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.audioManager = new AudioManager();
                this.saveManager = new SaveManager();
                this.achievementSystem = new AchievementSystem();

                this.state = {
                    player: {
                        x: this.canvas.width / 2,
                        y: this.canvas.height / 2,
                        size: 25,
                        speed: 4,
                        hp: 120,
                        maxHp: 120,
                        weapon: null,
                        score: 0,
                        combo: 0,
                        maxCombo: 0
                    },
                    level: 1,
                    kills: 0,
                    enemies: [],
                    items: [],
                    projectiles: [],
                    isPlaying: false,
                    isPaused: false,
                    isGameOver: false,
                    mouseX: this.canvas.width / 2,
                    mouseY: this.canvas.height / 2,
                    lastEnemySpawn: 0,
                    enemySpawnRate: 2000,
                    lastTime: 0
                };

                this.weapons = [
                    { name: '木剑', damage: 8, rarity: 'common', color: '#8B4513' },
                    { name: '生锈的刀', damage: 5, rarity: 'common', color: '#888' },
                    { name: '铁剑', damage: 12, rarity: 'uncommon', color: '#C0C0C0' },
                    { name: '精灵长剑', damage: 20, rarity: 'rare', color: '#00FFFF' },
                    { name: '龙牙剑', damage: 35, rarity: 'epic', color: '#FF00FF' },
                    { name: '王者之剑', damage: 50, rarity: 'legendary', color: '#FFFF00' },
                    { name: '创世之刃', damage: 100, rarity: 'mythic', color: '#00FF00' },
                    { name: '火焰之刃', damage: 25, rarity: 'rare', color: '#FF4500' },
                    { name: '冰霜之刺', damage: 22, rarity: 'rare', color: '#0080ff' },
                    { name: '雷鸣法杖', damage: 28, rarity: 'rare', color: '#FFFF00' }
                ];

                this.enemyTypes = [
                    { name: '史莱姆', speed: 1.0, hp: 15, damage: 3, size: 1.0, color: '#87ceeb' },
                    { name: '骷髅', speed: 1.2, hp: 25, damage: 5, size: 1.2, color: '#e0e0e0' },
                    { name: '哥布林', speed: 1.5, hp: 20, damage: 4, size: 1.0, color: '#32cd32' },
                    { name: '恶魔', speed: 1.3, hp: 40, damage: 8, size: 1.5, color: '#dc143c' },
                    { name: '石头人', speed: 0.8, hp: 60, damage: 10, size: 2.0, color: '#708090' }
                ];

                this.setupEventListeners();
                this.updateUIText();
                this.loadSavedGame();
            }

            setupEventListeners() {
                // 鼠标移动
                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.state.mouseX = e.clientX - rect.left;
                    this.state.mouseY = e.clientY - rect.top;
                });

                // 鼠标点击攻击
                this.canvas.addEventListener('click', (e) => {
                    if (!this.state.isPlaying || this.state.isPaused) return;

                    // 查找范围内最近的敌人进行攻击
                    let closestEnemy = null;
                    let closestDist = 100; // 最大攻击距离

                    for (const enemy of this.state.enemies) {
                        const dist = this.distance(
                            this.state.player.x, this.state.player.y,
                            enemy.x, enemy.y
                        );
                        if (dist < closestDist) {
                            closestDist = dist;
                            closestEnemy = enemy;
                        }
                    }

                    if (closestEnemy) {
                        this.attackEnemy(closestEnemy);
                    }
                });

                // 键盘事件
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        if (this.state.isPlaying && !this.state.isGameOver) {
                            this.togglePause();
                        }
                    }

                    // 技能快捷键 (Q, W, E, R)
                    if (this.state.isPlaying && !this.state.isPaused && !this.state.isGameOver) {
                        switch(e.key.toLowerCase()) {
                            case 'q':
                                this.useSkill('aoe');
                                break;
                            case 'w':
                                this.useSkill('heal');
                                break;
                            case 'e':
                                this.useSkill('teleport');
                                break;
                            case 'r':
                                this.useSkill('berserk');
                                break;
                        }
                    }
                });

                // 按钮事件
                document.getElementById('start-btn').addEventListener('click', () => {
                    document.getElementById('start-screen').classList.add('hidden');
                    this.startGame();
                });

                document.getElementById('restart-btn').addEventListener('click', () => {
                    document.getElementById('game-over').classList.add('hidden');
                    this.restartGame();
                });

                document.getElementById('main-menu-btn').addEventListener('click', () => {
                    document.getElementById('game-over').classList.add('hidden');
                    document.getElementById('start-screen').classList.remove('hidden');
                    this.endGame();
                });

                document.getElementById('continue-game-btn').addEventListener('click', () => {
                    this.togglePause();
                });

                document.getElementById('pause-main-menu-btn').addEventListener('click', () => {
                    document.getElementById('pause-menu').classList.add('hidden');
                    document.getElementById('start-screen').classList.remove('hidden');
                    this.endGame();
                });

                document.getElementById('pause-settings-btn').addEventListener('click', () => {
                    document.getElementById('pause-menu').classList.add('hidden');
                    document.getElementById('settings-menu').classList.remove('hidden');
                });

                document.getElementById('back-to-pause').addEventListener('click', () => {
                    document.getElementById('settings-menu').classList.add('hidden');
                    document.getElementById('pause-menu').classList.remove('hidden');
                });

                document.getElementById('back-to-main').addEventListener('click', () => {
                    document.getElementById('settings-menu').classList.add('hidden');
                    document.getElementById('start-screen').classList.remove('hidden');
                });

                // 设置选项
                document.getElementById('sound-enabled').addEventListener('change', (e) => {
                    this.audioManager.toggle();
                });

                document.getElementById('language-select').addEventListener('change', (e) => {
                    currentLanguage = e.target.value;
                    localStorage.setItem('language', currentLanguage);
                    this.updateUIText();
                });
            }

            startGame() {
                this.state = {
                    ...this.state,
                    isPlaying: true,
                    isPaused: false,
                    isGameOver: false,
                    player: {
                        ...this.state.player,
                        x: this.canvas.width / 2,
                        y: this.canvas.height / 2,
                        hp: this.state.player.maxHp,
                        weapon: null,
                        score: 0,
                        combo: 0
                    },
                    level: 1,
                    kills: 0,
                    enemies: [],
                    items: [],
                    projectiles: [],
                    lastEnemySpawn: Date.now()
                };

                this.gameLoop();
            }

            restartGame() {
                this.startGame();
            }

            endGame() {
                this.state.isPlaying = false;
                this.state.isPaused = false;

                // 保存游戏统计
                this.saveStats();
            }

            togglePause() {
                this.state.isPaused = !this.state.isPaused;

                if (this.state.isPaused) {
                    document.getElementById('pause-menu').classList.remove('hidden');
                } else {
                    document.getElementById('pause-menu').classList.add('hidden');
                }
            }

            gameLoop(timestamp = 0) {
                if (!this.state.isPlaying || this.state.isPaused || this.state.isGameOver) return;

                const deltaTime = timestamp - this.state.lastTime;
                this.state.lastTime = timestamp;

                this.update();
                this.render();

                requestAnimationFrame((ts) => this.gameLoop(ts));
            }

            update() {
                if (this.state.isGameOver) return;

                // 更新玩家位置
                this.updatePlayerPosition();

                // 生成敌人
                this.spawnEnemies();

                // 更新敌人
                this.updateEnemies();

                // 更新物品
                this.updateItems();

                // 更新技能效果
                this.updateSkills();

                // 检查成就
                this.checkAchievements();

                // 更新UI
                this.updateUI();

                // 自动存档
                if (Date.now() % 30000 < 16) { // 每30秒自动保存
                    this.saveStats();
                }
            }

            updatePlayerPosition() {
                const dx = this.state.mouseX - this.state.player.x;
                const dy = this.state.mouseY - this.state.player.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 1) {
                    const moveDist = Math.min(dist, this.state.player.speed);
                    this.state.player.x += (dx / dist) * moveDist;
                    this.state.player.y += (dy / dist) * moveDist;
                }

                // 边界检测
                this.state.player.x = Math.max(this.state.player.size, Math.min(this.canvas.width - this.state.player.size, this.state.player.x));
                this.state.player.y = Math.max(this.state.player.size, Math.min(this.canvas.height - this.state.player.size, this.state.player.y));
            }

            spawnEnemies() {
                const now = Date.now();
                if (now - this.state.lastEnemySpawn > this.state.enemySpawnRate) {
                    const enemyType = this.enemyTypes[Math.floor(Math.random() * this.enemyTypes.length)];
                    const side = Math.floor(Math.random() * 4);
                    let x, y;

                    switch(side) {
                        case 0: x = Math.random() * this.canvas.width; y = -30; break;
                        case 1: x = this.canvas.width + 30; y = Math.random() * this.canvas.height; break;
                        case 2: x = Math.random() * this.canvas.width; y = this.canvas.height + 30; break;
                        case 3: x = -30; y = Math.random() * this.canvas.height; break;
                    }

                    const weapon = this.weapons[Math.floor(Math.random() * this.weapons.length)];

                    this.state.enemies.push({
                        x: x,
                        y: y,
                        size: enemyType.size * 15,
                        speed: enemyType.speed,
                        hp: enemyType.hp + (this.state.level * 2),
                        maxHp: enemyType.hp + (this.state.level * 2),
                        damage: enemyType.damage + (this.state.level * 0.2),
                        color: enemyType.color,
                        name: enemyType.name,
                        weapon: weapon
                    });

                    this.state.lastEnemySpawn = now;

                    // 随着关卡提升，加快敌人生成速度
                    this.state.enemySpawnRate = Math.max(500, 2000 - this.state.level * 30);
                }
            }

            updateEnemies() {
                for (let i = this.state.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.state.enemies[i];

                    // 敌人朝玩家移动
                    const dx = this.state.player.x - enemy.x;
                    const dy = this.state.player.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 5) {
                        enemy.x += (dx / dist) * enemy.speed;
                        enemy.y += (dy / dist) * enemy.speed;
                    }

                    // 碰撞检测 - 敌人撞击玩家
                    if (dist < this.state.player.size + enemy.size / 2) {
                        this.state.player.hp -= enemy.damage;
                        this.state.player.combo = 0; // 连击中断

                        if (this.state.player.hp <= 0) {
                            this.gameOver();
                            return;
                        }

                        this.audioManager.playSound('hit');
                        this.saveManager.showCombatLog(`受到了 ${enemy.damage.toFixed(1)} 点伤害`, 'enemy-death');
                    }

                    // 如果敌人死亡
                    if (enemy.hp <= 0) {
                        // 获取敌人的武器
                        this.state.player.weapon = enemy.weapon;
                        this.state.kills++;
                        this.state.player.combo++;

                        // 更新最大连击
                        if (this.state.player.combo > this.state.player.maxCombo) {
                            this.state.player.maxCombo = this.state.player.combo;
                        }

                        // 根据武器伤害和连击数计算得分
                        const weaponScore = this.state.player.weapon ? this.state.player.weapon.damage * 10 : 10;
                        const comboBonus = this.state.player.combo > 1 ? this.state.player.combo * 5 : 0;
                        this.state.player.score += Math.floor(weaponScore + comboBonus);

                        // 升级检测
                        if (this.state.kills > 0 && this.state.kills % 10 === 0) {
                            this.state.level++;
                            this.state.player.maxHp += 10;
                            this.state.player.hp = Math.min(this.state.player.maxHp, this.state.player.hp + 20);
                            this.audioManager.playSound('levelup');
                            this.saveManager.showCombatLog(`🎉 升级到第 ${this.state.level} 关！`, 'level-up');
                        }

                        // 掉落物品
                        if (Math.random() < 0.3) { // 30% 概率掉落武器
                            this.state.items.push({
                                x: enemy.x,
                                y: enemy.y,
                                type: 'weapon',
                                value: enemy.weapon,
                                size: 10,
                                color: enemy.weapon.color
                            });
                        }

                        this.state.enemies.splice(i, 1);
                        this.audioManager.playSound('pickup');
                    }
                }
            }

            updateItems() {
                for (let i = this.state.items.length - 1; i >= 0; i--) {
                    const item = this.state.items[i];

                    // 绘制物品
                    this.ctx.fillStyle = item.color;
                    this.ctx.beginPath();
                    this.ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                    this.ctx.fill();

                    // 检测玩家与物品碰撞
                    const dist = this.distance(this.state.player.x, this.state.player.y, item.x, item.y);
                    if (dist < this.state.player.size + item.size) {
                        if (item.type === 'weapon') {
                            this.state.player.weapon = item.value;
                            this.saveManager.showCombatLog(`олучили новое оружие: ${item.value.name}!`, 'weapon-get');
                        }

                        this.state.items.splice(i, 1);
                        this.audioManager.playSound('pickup');
                    }
                }
            }

            attackEnemy(enemy) {
                const weaponDamage = this.state.player.weapon ? this.state.player.weapon.damage : 10;
                enemy.hp -= weaponDamage;

                // 显示伤害数字
                this.saveManager.showCombatLog(`击中敌人，造成 ${weaponDamage} 点伤害`, 'weapon-get');

                // 重置连击时间
                this.state.lastKillTime = Date.now();
            }

            useSkill(skillType) {
                switch(skillType) {
                    case 'aoe':
                        // 范围攻击
                        let hitCount = 0;
                        for (const enemy of this.state.enemies) {
                            const dist = this.distance(this.state.player.x, this.state.player.y, enemy.x, enemy.y);
                            if (dist < 100) {
                                enemy.hp -= (this.state.player.weapon ? this.state.player.weapon.damage : 10) * 1.5;
                                hitCount++;
                            }
                        }
                        if (hitCount > 0) {
                            this.saveManager.showCombatLog(`🌀 旋风斩击中 ${hitCount} 个敌人!`, 'weapon-get');
                        } else {
                            this.saveManager.showCombatLog(`🌀 旋风斩没有击中任何敌人`, 'enemy-death');
                        }
                        break;

                    case 'heal':
                        // 治疗
                        const healAmount = 20 + (this.state.player.maxHp * 0.1);
                        this.state.player.hp = Math.min(this.state.player.maxHp, this.state.player.hp + healAmount);
                        this.saveManager.showCombatLog(`💚 治疗光环恢复 ${healAmount.toFixed(1)} 生命!`, 'level-up');
                        break;

                    case 'teleport':
                        // 传送
                        this.state.player.x = this.state.mouseX;
                        this.state.player.y = this.state.mouseY;
                        this.saveManager.showCombatLog(`✨ 传送完成!`, 'weapon-get');
                        break;

                    case 'berserk':
                        // 狂暴
                        this.saveManager.showCombatLog(`😠 狂暴开启，伤害翻倍!`, 'level-up');
                        // 简单实现：暂时增加攻击力
                        setTimeout(() => {
                            this.saveManager.showCombatLog(`😠 狂暴效果结束`, 'enemy-death');
                        }, 10000); // 10秒后结束
                        break;
                }
            }

            updateSkills() {
                // 更新技能冷却时间（简化实现）
            }

            checkAchievements() {
                const stats = {
                    kills: this.state.kills,
                    level: this.state.level,
                    max_combo: this.state.player.maxCombo,
                    score: this.state.player.score
                };

                this.achievementSystem.checkAchievements(stats);
            }

            gameOver() {
                this.state.isPlaying = false;
                this.state.isGameOver = true;

                // 更新结束界面
                document.getElementById('final-level').textContent = this.state.level;
                document.getElementById('final-kills').textContent = this.state.kills;
                document.getElementById('final-score').textContent = this.state.player.score;
                document.getElementById('max-combo').textContent = this.state.player.maxCombo;

                document.getElementById('game-over').classList.remove('hidden');

                // 保存最终统计
                this.saveStats();
            }

            saveStats() {
                const stats = {
                    level: this.state.level,
                    kills: this.state.kills,
                    score: this.state.player.score,
                    maxCombo: this.state.player.maxCombo,
                    weapon: this.state.player.weapon,
                    hp: this.state.player.hp,
                    maxHp: this.state.player.maxHp
                };

                this.saveManager.save(stats);
            }

            loadSavedGame() {
                const saved = this.saveManager.load();
                if (saved && saved.level) {
                    document.getElementById('continue-btn').classList.remove('hidden');
                    document.getElementById('continue-btn').addEventListener('click', () => {
                        document.getElementById('start-screen').classList.add('hidden');
                        this.startGame();
                        // 可以在这里恢复之前的进度
                    });
                }
            }

            render() {
                // 清除画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制背景网格
                this.drawBackground();

                // 绘制玩家
                this.ctx.fillStyle = '#4ade80';
                this.ctx.beginPath();
                this.ctx.arc(this.state.player.x, this.state.player.y, this.state.player.size, 0, Math.PI * 2);
                this.ctx.fill();

                // 绘制武器
                if (this.state.player.weapon) {
                    this.ctx.fillStyle = this.state.player.weapon.color;
                    this.ctx.fillRect(
                        this.state.player.x - this.state.player.size/2,
                        this.state.player.y - this.state.player.size - 15,
                        this.state.player.size,
                        8
                    );
                }

                // 绘制敌人
                for (const enemy of this.state.enemies) {
                    // 敌人身
                    this.ctx.fillStyle = enemy.color;
                    this.ctx.beginPath();
                    this.ctx.arc(enemy.x, enemy.y, enemy.size / 2, 0, Math.PI * 2);
                    this.ctx.fill();

                    // 血条背景
                    this.ctx.fillStyle = '#333';
                    this.ctx.fillRect(enemy.x - 20, enemy.y - enemy.size / 2 - 15, 40, 5);

                    // 血条前景
                    const hpPercent = enemy.hp / enemy.maxHp;
                    this.ctx.fillStyle = hpPercent > 0.5 ? '#4ade80' : hpPercent > 0.25 ? '#fbbf24' : '#ef4444';
                    this.ctx.fillRect(enemy.x - 20, enemy.y - enemy.size / 2 - 15, 40 * hpPercent, 5);
                }

                // 绘制物品
                for (const item of this.state.items) {
                    this.ctx.fillStyle = item.color;
                    this.ctx.beginPath();
                    this.ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            drawBackground() {
                // 绘制渐变背景
                const gradient = this.ctx.createRadialGradient(
                    this.canvas.width/2, this.canvas.height/2, 0,
                    this.canvas.width/2, this.canvas.height/2, this.canvas.width/2
                );
                gradient.addColorStop(0, 'rgba(25, 25, 50, 0.3)');
                gradient.addColorStop(1, 'rgba(15, 15, 35, 0.8)');

                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 绘制网格线
                this.ctx.strokeStyle = 'rgba(100, 100, 150, 0.1)';
                this.ctx.lineWidth = 1;

                // 垂直线
                for (let x = 0; x < this.canvas.width; x += 50) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }

                // 水平线
                for (let y = 0; y < this.canvas.height; y += 50) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
            }

            updateUI() {
                document.getElementById('hp').textContent = Math.max(0, Math.floor(this.state.player.hp));
                document.getElementById('maxHp').textContent = this.state.player.maxHp;
                document.getElementById('weapon').textContent = this.state.player.weapon ? this.state.player.weapon.name : '无';
                document.getElementById('level').textContent = this.state.level;
                document.getElementById('kills').textContent = this.state.kills;
                document.getElementById('combo').textContent = this.state.player.combo;
                document.getElementById('score').textContent = this.state.player.score;
            }

            updateUIText() {
                updateUIText();
            }

            distance(x1, y1, x2, y2) {
                return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            }
        }

        // 启动游戏
        window.addEventListener('load', () => {
            const game = new Game();
            window.game = game; // 暴露到全局以便调试

            // 添加成就系统到全局
            window.achievementSystem = game.achievementSystem;

            // 添加语言切换函数
            window.switchLanguage = (lang) => {
                currentLanguage = lang;
                localStorage.setItem('language', currentLanguage);
                game.updateUIText();
            };
        });

        // 添加全局键盘事件处理器
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F1') {
                e.preventDefault();
                // 显示/隐藏调试信息
                console.log('游戏调试信息:', window.game ? window.game.state : '游戏未初始化');
            }
        });
    </script>
