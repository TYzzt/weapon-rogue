<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - 模块化重构版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e6e6e6;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            display: block;
            border-radius: 12px;
        }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #stats {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #4a4a8a;
            font-size: 15px;
            line-height: 1.8;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #4a4a6a;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .hidden {
            display: none !important;
        }

        #instructions {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        h1 {
            color: #4ade80;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        h2 {
            color: #f87171;
            margin-bottom: 15px;
        }

        .achievement-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            border: 2px solid gold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10000;
            font-weight: bold;
            animation: slideInRight 0.5s ease-out;
            min-width: 250px;
            text-align: center;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        #achievements-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        #achievements-panel .panel-content {
            background: #1a1a2e;
            color: #eee;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid #4a4a6a;
        }

        #achievements-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #achievements-panel .close-btn {
            background: #4a4a6a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        #achievements-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .achievement-item {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #4a4a6a;
            background: rgba(74, 74, 106, 0.1);
            transition: transform 0.2s;
        }

        .achievement-item.unlocked {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .achievement-item:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ 生命：<span id="hp">100</span></div>
                <div>⚔️ 武器：<span id="weapon">无</span></div>
                <div>🏆 关卡：<span id="level">1</span></div>
                <div>💀 击杀：<span id="kills">0</span></div>
                <div>💎 遗物：<span id="relics">0</span></div>
            </div>
        </div>
        <div id="game-over" class="hidden">
            <h2>💥 游戏结束</h2>
            <p>你到达了第 <span id="final-level">0</span> 关</p>
            <p>击败了 <span id="final-kills">0</span> 个敌人</p>
            <p>获得了 <span id="final-relics">0</span> 个遗物</p>
            <button id="restart-btn">🔄 重新开始</button>
        </div>
        <div id="start-screen">
            <h1>🗡️ 武器替换者</h1>
            <div id="instructions">
                <p>🎯 <strong>游戏目标:</strong> 在武器不断变化的情况下尽可能存活更久</p>
                <p>🎮 <strong>操作:</strong> 鼠标移动 & 点击攻击</p>
                <p>⚠️ <strong>注意:</strong> 每次获得新武器都会替换当前武器</p>
                <p>✨ <strong>特性:</strong> 模块化架构，无全局变量冲突</p>
            </div>
            <button id="start-btn">🎮 开始游戏</button>
        </div>
    </div>

    <!-- 成就面板 -->
    <div id="achievements-panel">
        <div class="panel-content">
            <div class="panel-header">
                <h2>🏆 游戏成就</h2>
                <button class="close-btn" id="close-achievements">关闭</button>
            </div>
            <div id="achievements-stats">统计信息将在此显示</div>
            <div id="achievements-list">成就将在此显示</div>
        </div>
    </div>

    <!-- 引入模块管理器 -->
    <script src="./module-manager.js"></script>

    <!-- 引入统一的游戏逻辑 -->
    <script src="./unified-game.js"></script>

    <script>
        // UI相关功能
        document.addEventListener('keydown', function(e) {
            // Ctrl+F1 查看成就
            if (e.key === 'F1' && e.ctrlKey) {
                document.getElementById('achievements-panel').style.display = 'flex';
                updateAchievementsDisplay();
            }

            // ESC 暂停游戏
            if (e.key === 'Escape' && window.game && window.game.gameState.player.isPlaying) {
                window.game.stop();
                showPauseMenu();
            }

            // F5 保存游戏
            if (e.key === 'F5' && e.ctrlKey && window.game) {
                e.preventDefault();
                const saveSystem = window.game.modules.get('saveSystem');
                if (saveSystem) saveSystem.save();
            }

            // F9 加载游戏
            if (e.key === 'F9' && e.ctrlKey && window.game) {
                e.preventDefault();
                const saveSystem = window.game.modules.get('saveSystem');
                if (saveSystem) saveSystem.load();
            }
        });

        // 关闭成就面板
        document.getElementById('close-achievements').addEventListener('click', function() {
            document.getElementById('achievements-panel').style.display = 'none';
        });

        // 点击外部区域关闭成就面板
        document.getElementById('achievements-panel').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });

        // 更新成就显示
        function updateAchievementsDisplay() {
            const achievementsList = document.getElementById('achievements-list');
            if (!window.game || !window.game.modules.get('achievementSystem')) {
                achievementsList.innerHTML = '<div>成就系统尚未初始化</div>';
                return;
            }

            const achievementSystem = window.game.modules.get('achievementSystem');
            achievementsList.innerHTML = '';

            for (let [id, achievement] of achievementSystem.achievements) {
                const achElement = document.createElement('div');
                achElement.className = `achievement-item ${achievement.unlocked ? 'unlocked' : ''}`;

                const status = achievement.unlocked ? '✅' : '🔒';
                const progressStr = achievement.unlocked ? '' : `(进度: ${Math.round(achievement.progress || 0)}%)`;
                const unlockTime = achievement.unlocked ? ` - 解锁时间: ${new Date(achievement.unlockTime).toLocaleString()}` : '';

                achElement.innerHTML = `
                    <div style="font-weight: bold; color: ${achievement.unlocked ? '#4ade80' : '#aaa'};">
                        ${status} ${achievement.name}
                    </div>
                    <div style="font-size: 0.9em; margin-top: 5px;">${achievement.description} ${progressStr}${unlockTime}</div>
                `;

                achievementsList.appendChild(achElement);
            }
        }

        // 显示暂停菜单
        function showPauseMenu() {
            const pauseMenu = document.createElement('div');
            pauseMenu.id = 'pause-menu';
            pauseMenu.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.85);
                color: white;
                padding: 30px;
                border-radius: 10px;
                border: 3px solid #4ade80;
                z-index: 9999;
                text-align: center;
            `;

            pauseMenu.innerHTML = `
                <h2 style="color: #4ade80; margin-top: 0;">游戏已暂停</h2>
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                    <button onclick="window.game.start(); this.closest('#pause-menu').remove();" style="
                        background: #4ade80; color: black; border: none;
                        padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold;
                    ">▶️ 继续游戏</button>
                    <button onclick="location.reload();" style="
                        background: #6b7280; color: white; border: none;
                        padding: 12px 30px; border-radius: 5px; cursor: pointer;
                    ">🔄 重新开始</button>
                </div>
            `;

            document.getElementById('game-container').appendChild(pauseMenu);
        }

        // 战斗日志功能
        window.showCombatLog = function(message, type = 'general') {
            console.log(`[${type}] ${message}`);
            // 可以在这里添加可视化战斗日志显示
        };

        console.log("🎮 武器替换者 - 模块化重构版已完全加载");
    </script>
</body>
</html>
