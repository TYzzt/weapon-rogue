<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - 简化测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
        }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        #stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            font-size: 14px;
            line-height: 1.8;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #4a4a6a;
            text-align: center;
            z-index: 100;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ 生命：<span id="hp">100</span></div>
                <div>⚔️ 武器：<span id="weapon">无</span></div>
                <div>🏆 关卡：<span id="level">1</span></div>
                <div>💀 击杀：<span id="kills">0</span></div>
            </div>
        </div>
        <div id="game-over" class="hidden">
            <h2>游戏结束</h2>
            <p>你到达了第 <span id="final-level">0</span> 关</p>
            <p>击败了 <span id="final-kills">0</span> 个敌人</p>
            <button id="restart-btn">重新开始</button>
        </div>
        <div id="start-screen">
            <h1>🗡️ 武器替换者 - 测试版</h1>
            <p class="description">
                敌人掉落的武器<strong>必定替换</strong>你当前的武器<br>
                这可能是好事，也可能是灾难...<br><br>
                收集药水和遗物来改变命运
            </p>
            <button id="start-btn">开始游戏</button>
        </div>
    </div>

    <script>
        // 简化版游戏代码 - 用于测试核心功能
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameState = {
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                size: 30,
                speed: 5,
                hp: 100,
                maxHp: 100,
                weapon: null,
                isPlaying: false,
                isGameOver: false
            },
            level: 1,
            kills: 0,
            enemies: [],
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2
        };

        // 武器库
        const WEAPONS = [
            { name: '生锈的刀', damage: 5, rarity: 'common', color: '#888' },
            { name: '木棍', damage: 3, rarity: 'common', color: '#8B4513' },
            { name: '铁剑', damage: 10, rarity: 'uncommon', color: '#silver' },
            { name: '秘银剑', damage: 25, rarity: 'rare', color: '#00ffff' },
            { name: '龙息巨剑', damage: 50, rarity: 'legendary', color: '#ff0000' },
        ];

        // 鼠标移动监听
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouseX = e.clientX - rect.left;
            gameState.mouseY = e.clientY - rect.top;
        });

        // 点击开始游戏
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            gameState.player.isPlaying = true;
            gameLoop();
        });

        // 重新开始
        document.getElementById('restart-btn').addEventListener('click', () => {
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: 30,
                    speed: 5,
                    hp: 100,
                    maxHp: 100,
                    weapon: null,
                    isPlaying: true,
                    isGameOver: false
                },
                level: 1,
                kills: 0,
                enemies: [],
                mouseX: canvas.width / 2,
                mouseY: canvas.height / 2
            };
            document.getElementById('game-over').classList.add('hidden');
            gameLoop();
        });

        // 简单的敌人生成
        function spawnEnemy() {
            if (!gameState.player.isPlaying) return;
            
            const enemy = {
                x: Math.random() < 0.5 ? -20 : canvas.width + 20,
                y: Math.random() * canvas.height,
                size: 20 + Math.random() * 20,
                speed: 1 + Math.random() * 2,
                hp: 20,
                maxHp: 20,
                damage: 5,
                color: `hsl(${Math.random() * 60}, 70%, 50%)`,
                weapon: WEAPONS[Math.floor(Math.random() * WEAPONS.length)]
            };
            
            gameState.enemies.push(enemy);
            
            // 持续生成敌人
            if (gameState.player.isPlaying) {
                setTimeout(spawnEnemy, 2000 - Math.min(1500, gameState.level * 50));
            }
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.player.isPlaying) return;
            
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 更新玩家位置（跟随鼠标）
            const dx = gameState.mouseX - gameState.player.x;
            const dy = gameState.mouseY - gameState.player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist > 5) {
                gameState.player.x += (dx / dist) * gameState.player.speed;
            }
            
            // 边界限制
            gameState.player.x = Math.max(gameState.player.size, Math.min(canvas.width - gameState.player.size, gameState.player.x));
            gameState.player.y = Math.max(gameState.player.size, Math.min(canvas.height - gameState.player.size, gameState.player.y));
            
            // 绘制玩家
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.size, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制当前武器
            if (gameState.player.weapon) {
                ctx.fillStyle = gameState.player.weapon.color;
                ctx.fillRect(gameState.player.x + 20, gameState.player.y - 5, 25, 8);
            }
            
            // 更新和绘制敌人
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];
                
                // 敌人朝玩家移动
                const edx = gameState.player.x - enemy.x;
                const edy = gameState.player.y - enemy.y;
                const edist = Math.sqrt(edx * edx + edy * edy);
                
                enemy.x += (edx / edist) * enemy.speed;
                enemy.y += (edy / edist) * enemy.speed;
                
                // 检测碰撞
                const collisionDist = gameState.player.size + enemy.size;
                if (edist < collisionDist) {
                    // 玩家受伤
                    gameState.player.hp -= enemy.damage;
                    
                    if (gameState.player.hp <= 0) {
                        gameState.player.hp = 0;
                        gameState.player.isPlaying = false;
                        gameState.player.isGameOver = true;
                        
                        document.getElementById('final-level').textContent = gameState.level;
                        document.getElementById('final-kills').textContent = gameState.kills;
                        document.getElementById('game-over').classList.remove('hidden');
                        return;
                    }
                }
                
                // 绘制敌人
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 血条
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - 20, enemy.y - enemy.size - 10, 40, 6);
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x - 20, enemy.y - enemy.size - 10, 40 * hpPercent, 6);
                
                // 如果敌人死亡
                if (enemy.hp <= 0) {
                    // 获得敌人武器
                    gameState.player.weapon = enemy.weapon;
                    
                    gameState.kills++;
                    if (gameState.kills % 10 === 0) {
                        gameState.level++;
                    }
                    
                    gameState.enemies.splice(i, 1);
                }
            }
            
            // 更新UI
            document.getElementById('hp').textContent = Math.max(0, Math.floor(gameState.player.hp));
            document.getElementById('weapon').textContent = gameState.player.weapon ? gameState.player.weapon.name : '无';
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('kills').textContent = gameState.kills;
            
            // 继续游戏循环
            if (gameState.player.isPlaying) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // 开始生成敌人
        setTimeout(spawnEnemy, 1000);
    </script>
</body>
</html>
