<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - 测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
        }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        #stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            font-size: 14px;
            line-height: 1.8;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #4a4a6a;
            text-align: center;
            z-index: 100;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .hidden {
            display: none !important;
        }

        #instructions {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ 生命：<span id="hp">100</span></div>
                <div>⚔️ 武器：<span id="weapon">无</span></div>
                <div>🏆 关卡：<span id="level">1</span></div>
                <div>💀 击杀：<span id="kills">0</span></div>
                <div>💎 遗物：<span id="relics">0</span></div>
            </div>
        </div>
        <div id="game-over" class="hidden">
            <h2>游戏结束</h2>
            <p>你到达了第 <span id="final-level">0</span> 关</p>
            <p>击败了 <span id="final-kills">0</span> 个敌人</p>
            <p>获得了 <span id="final-relics">0</span> 个遗物</p>
            <button id="restart-btn">重新开始</button>
        </div>
        <div id="start-screen">
            <h1>🗡️ 武器替换者 - 测试版</h1>
            <div id="instructions">
                <p>🎯 <strong>游戏目标:</strong> 在武器不断变化的情况下尽可能存活更久</p>
                <p>🎮 <strong>操作:</strong> 鼠标移动 & 点击攻击 | Q/W/E/R 使用技能</p>
                <p>⚠️ <strong>注意:</strong> 每次获得新武器都会替换当前武器</p>
            </div>
            <button id="start-btn">开始游戏</button>
            <button id="load-test-data">加载改进内容</button>
        </div>
    </div>

    <!-- 游戏核心代码 -->
    <script>
        // 基础游戏状态
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态初始化
        let gameState = {
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                size: 30,
                speed: 5,
                hp: 100,
                maxHp: 100,
                weapon: null,
                isPlaying: false,
                isGameOver: false,
                score: 0,
                maxCombo: 0,
                currentCombo: 0,
                relics: []
            },
            level: 1,
            kills: 0,
            enemies: [],
            items: [], // 遗物、药水等物品
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2,
            enemySpawnTimer: 0,
            enemySpawnRate: 2000, // 毫秒
            combatLog: []
        };

        // 初始武器库
        let WEAPONS = [
            { name: '木剑', damage: 8, rarity: 'common', color: '#8B4513' },
            { name: '生锈的刀', damage: 5, rarity: 'common', color: '#888' },
            { name: '铁剑', damage: 12, rarity: 'uncommon', color: '#C0C0C0' },
            { name: '精灵长剑', damage: 20, rarity: 'rare', color: '#00FFFF' },
            { name: '龙牙剑', damage: 35, rarity: 'epic', color: '#FF00FF' },
            { name: '王者之剑', damage: 50, rarity: 'legendary', color: '#FFFF00' },
            { name: '创世之刃', damage: 100, rarity: 'mythic', color: '#00FF00' },
        ];

        // 初始敌人类型
        let ENEMY_TYPES = {
            'SLIME': { name: '史莱姆', speed: 1.0, hp: 3.0, damage: 2.0, size: 1.0, behavior: 'melee' },
            'SKELETON': { name: '骷髅', speed: 1.2, hp: 5.0, damage: 2.5, size: 1.2, behavior: 'melee' },
            'BONE_ARCHER': { name: '骷髅弓箭手', speed: 0.8, hp: 2.5, damage: 3.0, size: 1.0, behavior: 'ranged' }
        };

        // 基础函数
        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        // 鼠标移动监听
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouseX = e.clientX - rect.left;
            gameState.mouseY = e.clientY - rect.top;
        });

        // 点击开始游戏
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            gameState.player.isPlaying = true;
            gameState.startTime = Date.now();
            gameLoop();
        });

        // 加载测试数据按钮 - 验证改进内容
        document.getElementById('load-test-data').addEventListener('click', () => {
            alert(`当前武器数量: ${WEAPONS.length}\n当前敌人类型: ${Object.keys(ENEMY_TYPES).length}`);
        });

        // 重新开始
        document.getElementById('restart-btn').addEventListener('click', () => {
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: 30,
                    speed: 5,
                    hp: 100,
                    maxHp: 100,
                    weapon: null,
                    isPlaying: true,
                    isGameOver: false,
                    score: 0,
                    maxCombo: 0,
                    currentCombo: 0,
                    relics: []
                },
                level: 1,
                kills: 0,
                enemies: [],
                items: [],
                mouseX: canvas.width / 2,
                mouseY: canvas.height / 2,
                enemySpawnTimer: 0,
                enemySpawnRate: 2000,
                combatLog: [],
                startTime: Date.now()
            };
            document.getElementById('game-over').classList.add('hidden');
            gameLoop();
        });

        // 简单的敌人生成
        function spawnEnemy() {
            if (!gameState.player.isPlaying) return;

            // 随机选择敌人类型
            const enemyKeys = Object.keys(ENEMY_TYPES);
            const randomTypeKey = enemyKeys[Math.floor(Math.random() * enemyKeys.length)];
            const enemyTemplate = ENEMY_TYPES[randomTypeKey];

            const side = Math.floor(Math.random() * 4); // 0: top, 1: right, 2: bottom, 3: left
            let x, y;

            switch(side) {
                case 0: // top
                    x = Math.random() * canvas.width;
                    y = -20;
                    break;
                case 1: // right
                    x = canvas.width + 20;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // bottom
                    x = Math.random() * canvas.width;
                    y = canvas.height + 20;
                    break;
                case 3: // left
                    x = -20;
                    y = Math.random() * canvas.height;
                    break;
            }

            const enemy = {
                x: x,
                y: y,
                size: enemyTemplate.size * 15,
                speed: enemyTemplate.speed,
                hp: enemyTemplate.hp * 10,
                maxHp: enemyTemplate.hp * 10,
                damage: enemyTemplate.damage,
                color: `hsl(${Math.random() * 60 + enemyKeys.indexOf(randomTypeKey) * 60}, 70%, 50%)`,
                weapon: WEAPONS[Math.floor(Math.random() * WEAPONS.length)],
                type: randomTypeKey,
                name: enemyTemplate.name
            };

            gameState.enemies.push(enemy);
        }

        // 生成武器掉落
        function spawnWeaponDrop(x, y) {
            const weapon = {...WEAPONS[Math.floor(Math.random() * WEAPONS.length)]};
            const item = {
                x: x,
                y: y,
                type: 'weapon',
                value: weapon,
                size: 10,
                color: weapon.color,
                collected: false
            };
            gameState.items.push(item);
        }

        // 游戏主循环
        function gameLoop(timestamp) {
            if (!gameState.player.isPlaying) return;

            // 计算时间差
            const now = Date.now();
            const deltaTime = now - (gameState.lastTime || now);
            gameState.lastTime = now;

            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新玩家位置（跟随鼠标）
            const dx = gameState.mouseX - gameState.player.x;
            const dy = gameState.mouseY - gameState.player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 5) {
                const moveDist = Math.min(dist, gameState.player.speed);
                gameState.player.x += (dx / dist) * moveDist;
            }

            // 边界限制
            gameState.player.x = Math.max(gameState.player.size, Math.min(canvas.width - gameState.player.size, gameState.player.x));
            gameState.player.y = Math.max(gameState.player.size, Math.min(canvas.height - gameState.player.size, gameState.player.y));

            // 绘制玩家
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.size, 0, Math.PI * 2);
            ctx.fill();

            // 绘制当前武器（如果有的话）
            if (gameState.player.weapon) {
                ctx.fillStyle = gameState.player.weapon.color;
                ctx.fillRect(
                    gameState.player.x - gameState.player.size/2,
                    gameState.player.y - gameState.player.size - 15,
                    gameState.player.size,
                    8
                );
            }

            // 生成敌人（定时）
            gameState.enemySpawnTimer += deltaTime;
            if (gameState.enemySpawnTimer > gameState.enemySpawnRate) {
                spawnEnemy();
                gameState.enemySpawnTimer = 0;

                // 随着关卡推进，加快生成速度
                gameState.enemySpawnRate = Math.max(500, 2000 - gameState.level * 30);
            }

            // 更新和绘制敌人
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];

                // 敌人朝玩家移动
                const edx = gameState.player.x - enemy.x;
                const edy = gameState.player.y - enemy.y;
                const edist = Math.sqrt(edx * edx + edy * edy);

                if (edist > 5) {
                    enemy.x += (edx / edist) * enemy.speed;
                    enemy.y += (edy / edist) * enemy.speed;
                }

                // 检测碰撞
                const collisionDist = gameState.player.size + enemy.size / 2;
                if (edist < collisionDist) {
                    // 玩家受伤
                    gameState.player.hp -= enemy.damage;
                    gameState.player.currentCombo = 0; // 连击中断

                    if (gameState.player.hp <= 0) {
                        gameState.player.hp = 0;
                        gameState.player.isPlaying = false;
                        gameState.player.isGameOver = true;

                        document.getElementById('final-level').textContent = gameState.level;
                        document.getElementById('final-kills').textContent = gameState.kills;
                        document.getElementById('final-relics').textContent = gameState.player.relics.length;
                        document.getElementById('game-over').classList.remove('hidden');
                        return;
                    }
                }

                // 绘制敌人
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size / 2, 0, Math.PI * 2);
                ctx.fill();

                // 血条
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - 20, enemy.y - enemy.size / 2 - 15, 40, 5);
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x - 20, enemy.y - enemy.size / 2 - 15, 40 * hpPercent, 5);

                // 如果敌人死亡
                if (enemy.hp <= 0) {
                    // 获得敌人武器
                    gameState.player.weapon = enemy.weapon;

                    gameState.kills++;
                    gameState.player.currentCombo++;
                    if (gameState.player.currentCombo > gameState.player.maxCombo) {
                        gameState.player.maxCombo = gameState.player.currentCombo;
                    }

                    // 每10击杀升一级
                    if (gameState.kills % 10 === 0) {
                        gameState.level++;
                        // 升级回复一定生命值
                        gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 20);
                    }

                    // 生成武器掉落
                    spawnWeaponDrop(enemy.x, enemy.y);

                    gameState.enemies.splice(i, 1);
                }
            }

            // 更新和绘制物品
            for (let i = gameState.items.length - 1; i >= 0; i--) {
                const item = gameState.items[i];

                // 绘制物品
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                ctx.fill();

                // 检测玩家与物品碰撞
                const dist = distance(gameState.player.x, gameState.player.y, item.x, item.y);
                if (dist < gameState.player.size + item.size) {
                    // 拾取物品
                    if (item.type === 'weapon') {
                        gameState.player.weapon = item.value;
                    }

                    gameState.items.splice(i, 1);
                }
            }

            // 更新UI
            document.getElementById('hp').textContent = Math.max(0, Math.floor(gameState.player.hp));
            document.getElementById('weapon').textContent = gameState.player.weapon ? gameState.player.weapon.name : '无';
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('kills').textContent = gameState.kills;
            document.getElementById('relics').textContent = gameState.player.relics.length;

            // 继续游戏循环
            if (gameState.player.isPlaying) {
                requestAnimationFrame(gameLoop);
            }
        }

        console.log("基础游戏测试页面已加载");
    </script>

    <!-- 加载我们创建的改进模块 -->
    <script src="./core-gameplay-improvements.js"></script>
    <script src="./content-expansion-enhanced.js"></script>

    <script>
        // 添加加载完成提示
        console.log("所有改进模块已加载");

        // 更新加载测试数据按钮的功能
        document.getElementById('load-test-data').addEventListener('click', () => {
            // 检查是否有改进的武器库
            const totalWeapons = typeof WEAPONS !== 'undefined' ? WEAPONS.length : 'N/A';
            const totalEnemies = typeof ENEMY_TYPES !== 'undefined' ? Object.keys(ENEMY_TYPES).length : 'N/A';

            let message = `扩展内容加载状态:\n`;
            message += `武器数量: ${totalWeapons}\n`;
            message += `敌人类型: ${totalEnemies}\n`;

            if (typeof specialGameEvents !== 'undefined') {
                message += `特殊事件系统: 已加载\n`;
            }
            if (typeof difficultyManager !== 'undefined') {
                message += `难度管理系统: 已加载\n`;
            }
            if (typeof gameModeManager !== 'undefined') {
                message += `游戏模式管理: 已加载\n`;
            }

            alert(message);
        });
    </script>
</body>
</html>
