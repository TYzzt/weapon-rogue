<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - 重构优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e6e6e6;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            display: block;
            border-radius: 12px;
        }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #stats {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #4a4a8a;
            font-size: 15px;
            line-height: 1.8;
        }

        #start-screen, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #4a4a6a;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .hidden {
            display: none !important;
        }

        #instructions {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.5;
        }

        h1 {
            color: #4ade80;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        h2 {
            color: #f87171;
            margin-bottom: 15px;
        }

        /* 性能监控面板样式 */
        #performance-monitor {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ 生命：<span id="hp">100</span></div>
                <div>⚔️ 武器：<span id="weapon">无</span></div>
                <div>🏆 关卡：<span id="level">1</span></div>
                <div>💀 击杀：<span id="kills">0</span></div>
                <div>💎 遗物：<span id="relics">0</span></div>
            </div>
        </div>
        <div id="performance-monitor" class="hidden">
            <div>FPS: <span id="fps-counter">0</span></div>
            <div>Enemies: <span id="enemy-count">0</span></div>
            <div>State Updates: <span id="state-updates">0</span></div>
        </div>
        <div id="game-over" class="hidden">
            <h2>💥 游戏结束</h2>
            <p>你到达了第 <span id="final-level">0</span> 关</p>
            <p>击败了 <span id="final-kills">0</span> 个敌人</p>
            <p>获得了 <span id="final-relics">0</span> 个遗物</p>
            <button id="restart-btn">🔄 重新开始</button>
        </div>
        <div id="start-screen">
            <h1>🗡️ 武器替换者</h1>
            <div id="instructions">
                <p>🎯 <strong>游戏目标:</strong> 在武器不断变化的情况下尽可能存活更久</p>
                <p>🎮 <strong>操作:</strong> 鼠标移动 & 点击攻击</p>
                <p>⚠️ <strong>注意:</strong> 每次获得新武器都会替换当前武器</p>
                <p>✨ <strong>特性:</strong> 模块化架构 • 无全局冲突 • 高性能</p>
                <p>🔧 <strong>重构说明:</strong> 将71个文件整合为单一优化版本</p>
            </div>
            <button id="start-btn">🎮 开始游戏</button>
            <button id="show-performance">📊 显示性能监控</button>
        </div>
    </div>

    <!-- 引入优化的游戏逻辑 -->
    <script src="./compact-game.js"></script>

    <script>
        // 性能监控功能
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;

        // FPS 计算
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;

            if (delta >= 1000) {
                fps = Math.round((frameCount * 1000) / delta);
                frameCount = 0;
                lastTime = now;

                if (window.game) {
                    document.getElementById('fps-counter').textContent = fps;
                    document.getElementById('enemy-count').textContent = window.game.state.enemies.length;
                    document.getElementById('state-updates').textContent = window.game.state.kills;
                }
            }
        }

        // 监听性能监控按钮
        document.getElementById('show-performance').addEventListener('click', function() {
            document.getElementById('performance-monitor').classList.toggle('hidden');
        });

        // 拓展 gameLoop 函数以添加性能监控
        const originalGameLoop = window.CompactGame.prototype.gameLoop;
        window.CompactGame.prototype.gameLoop = function() {
            if (!this.state.player.isPlaying) return;

            const now = Date.now();
            const deltaTime = now - (this.config.lastTime || now);
            this.config.lastTime = now;

            // 更新系统
            this.updateSystems(deltaTime);

            // 渲染
            this.render();

            // 更新性能监控
            updateFPS();

            // 继续循环
            if (this.state.player.isPlaying) {
                this.animationFrameId = requestAnimationFrame(() => this.gameLoop());
            }
        };

        // 键盘事件处理
        document.addEventListener('keydown', function(e) {
            // ESC 暂停游戏
            if (e.key === 'Escape' && window.game && window.game.state.player.isPlaying) {
                window.game.stop();
                showPauseMenu();
            }

            // F1 显示性能监控
            if (e.key === 'F1') {
                document.getElementById('performance-monitor').classList.toggle('hidden');
            }
        });

        // 暂停菜单
        function showPauseMenu() {
            const pauseMenu = document.createElement('div');
            pauseMenu.id = 'pause-menu';
            pauseMenu.style.cssText = `
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.85);
                color: white;
                padding: 30px;
                border-radius: 10px;
                border: 3px solid #4ade80;
                z-index: 9999;
                text-align: center;
            `;

            pauseMenu.innerHTML = `
                <h2 style="color: #4ade80; margin-top: 0;">游戏已暂停</h2>
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                    <button onclick="window.game.start(); this.closest('#pause-menu').remove();" style="
                        background: #4ade80; color: black; border: none;
                        padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold;
                    ">▶️ 继续游戏</button>
                    <button onclick="location.reload();" style="
                        background: #6b7280; color: white; border: none;
                        padding: 12px 30px; border-radius: 5px; cursor: pointer;
                    ">🔄 重新开始</button>
                </div>
            `;

            document.getElementById('game-container').appendChild(pauseMenu);
        }

        console.log("🎮 武器替换者 - 重构优化版已完全加载");
        console.log("✨ 重构完成: 解决了71个JS文件的全局变量冲突和性能问题");
    </script>
</body>
</html>
