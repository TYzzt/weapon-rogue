            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            width: 800px;
            height: 600px;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
        }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        #stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            font-size: 14px;
            line-height: 1.8;
        }

        #extended-stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            font-size: 12px;
            min-width: 150px;
            z-index: 100;
        }

        #start-screen, #game-over, #achievements-panel, #settings-menu, #pause-menu, #tutorial-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #4a4a6a;
            text-align: center;
            z-index: 1000;

            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            transform: translate(-50%, -50%);

            display: block;
            margin: 10px auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;

            width: 250px;
        }

        .menu-button:hover {

        }

        }

            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;

            border: 2px solid gold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);

            font-weight: bold;

            text-align: center;

        #combat-log {

            bottom: 10px;

            background: rgba(0, 0, 0, 0.7);
            padding: 10px;

            font-size: 12px;
            max-height: 150px;

            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10001;

    <!-- 武器平衡性增强 -->
    <script>
        // 武器平衡性增强系统
        class DynamicWeaponBalancer {
            constructor() {
                this.weaponDropHistory = [];
                this.maxHistory = 20;
                this.balanceFactors = {
                    'common': 1.0,
                    'uncommon': 1.0,
                    'rare': 1.0,
                    'epic': 1.0,
                    'legendary': 1.0,
                    'mythic': 1.0
                };
            }

            recordWeaponDrop(weapon) {
                this.weaponDropHistory.push({
                    rarity: weapon.rarity,
                    timestamp: Date.now(),
                    level: gameState.level
                });

                if (this.weaponDropHistory.length > this.maxHistory) {
                    this.weaponDropHistory.shift();
                }

                this.updateBalanceFactors();
            }

            updateBalanceFactors() {
                for (let rarity in this.balanceFactors) {
                    this.balanceFactors[rarity] = 1.0;
                }

                const rarityCount = {
                    'common': 0, 'uncommon': 0, 'rare': 0,
                    'epic': 0, 'legendary': 0, 'mythic': 0
                };

                for (const drop of this.weaponDropHistory) {
                    rarityCount[drop.rarity]++;
                }

                for (let rarity in rarityCount) {
                    const count = rarityCount[rarity];
                    if (count > 0) {
                        this.balanceFactors[rarity] = Math.max(0.5, 1.0 - (count / this.maxHistory) * 0.7);
                    }
                }
            }

            getAdjustedRarityWeights(baseWeights) {
                const adjustedWeights = {};
                for (const [rarity, weight] of Object.entries(baseWeights)) {
                    adjustedWeights[rarity] = weight * this.balanceFactors[rarity];
                }
                return adjustedWeights;
            }
        }

        const dynamicWeaponBalancer = new DynamicWeaponBalancer();

        // 生成平衡武器的函数
        function generateBalancedWeapon(level, playerStatus = {}) {
            const levelFactor = Math.min(level / 50, 1.0);
            const desperateFactor = playerStatus.hp && playerStatus.maxHp
                ? Math.max(0, (1 - (playerStatus.hp / playerStatus.maxHp)) * 0.3)
                : 0;

            const baseRarities = {
                common: { weight: 50, multiplier: 1.0, description: '普通' },
                uncommon: { weight: 25, multiplier: 1.5, description: '罕见' },
                rare: { weight: 12, multiplier: 2.2, description: '稀有' },
                epic: { weight: 8, multiplier: 3.5, description: '史诗' },
                legendary: { weight: 4, multiplier: 5.0, description: '传说' },
                mythic: { weight: 1, multiplier: 8.0, description: '神话' }
            };

            let totalWeight = 0;
            const preBalanceAdjustedRarities = {};

            for (const [rarity, data] of Object.entries(baseRarities)) {
                let weight = data.weight;

                if (rarity === 'common') {
                    weight *= (1 - levelFactor * 0.7) * (1 - desperateFactor * 0.5);
                } else if (rarity === 'mythic') {
                    weight *= (1 + levelFactor * 0.3) * (1 + desperateFactor * 0.2);
                } else {
                    weight *= (1 + levelFactor * data.multiplier * 0.1) * (1 + desperateFactor * 0.1);
                }

                preBalanceAdjustedRarities[rarity] = { ...data, weight };
                totalWeight += weight;
            }

            // 应用动态平衡调整
            const fullyAdjustedRarities = dynamicWeaponBalancer.getAdjustedRarityWeights(preBalanceAdjustedRarities);
            let finalTotalWeight = 0;

            for (const [rarity, data] of Object.entries(fullyAdjustedRarities)) {
                finalTotalWeight += data.weight;
            }

            let random = Math.random() * finalTotalWeight;
            for (const [rarity, data] of Object.entries(fullyAdjustedRarities)) {
                random -= data.weight;
                if (random <= 0) {
                    const weaponsOfRarity = WEAPONS.filter(w => w.rarity === rarity);

                    if (weaponsOfRarity.length === 0) {
                        if (rarity === 'mythic') return generateBalancedWeapon(level, playerStatus);
                        if (rarity === 'legendary') return generateBalancedWeapon(level, playerStatus);
                        if (rarity === 'epic') return generateBalancedWeapon(level, playerStatus);
                        if (rarity === 'rare') return generateBalancedWeapon(level, playerStatus);
                        if (rarity === 'uncommon') return generateBalancedWeapon(level, playerStatus);
                        return WEAPONS[0] || { name: '拳头', damage: 1, rarity: 'common', color: '#ffffff' };
                    }

                    const weapon = weaponsOfRarity[Math.floor(Math.random() * weaponsOfRarity.length)];
                    const finalWeapon = { ...weapon, id: Date.now() + Math.random() };

                    dynamicWeaponBalancer.recordWeaponDrop(finalWeapon);
                    return finalWeapon;
                }
            }

            const commonWeapons = WEAPONS.filter(w => w.rarity === 'common');
            const weapon = commonWeapons.length > 0 ? commonWeapons[0] : { name: '拳头', damage: 1, rarity: 'common', color: '#ffffff' };
            const finalWeapon = { ...weapon, id: Date.now() + Math.random() };
            dynamicWeaponBalancer.recordWeaponDrop(finalWeapon);
            return finalWeapon;
        }
    </script>

    <script>
        class RegionSystem {
            constructor() {
                this.regions = [
                    { id: 'forest', name: '幽暗森林', levels: [1, 20], enemies: ['SLIME', 'GOBLIN'], themeColor: '#228B22', boss: 'FOREST_GUARDIAN' },
                    { id: 'mountain', name: '险峻山脉', levels: [21, 40], enemies: ['GOBLIN', 'ORC'], themeColor: '#8B4513', boss: 'MOUNTAIN_KING' },
                    { id: 'desert', name: '无尽沙漠', levels: [41, 60], enemies: ['SCORPION', 'MUMMY'], themeColor: '#F4A460', boss: 'DESERT_EMPEROR' },
                    { id: 'abyss', name: '深渊领域', levels: [61, 80], enemies: ['IMP', 'DEMON'], themeColor: '#4B0082', boss: 'LORD_OF_ABYSS' },
                    { id: 'heaven', name: '天堂领域', levels: [81, 100], enemies: ['ANGEL', 'ARCHON'], themeColor: '#FFFFFF', boss: 'GOD_OF_CREATION' }
                ];
                this.currentRegion = this.regions[0];
            }

            getCurrentRegion(level) {
                for (const region of this.regions) {
                    if (level >= region.levels[0] && level <= region.levels[1]) {
                        this.currentRegion = region;
                        return region;
                    }
                }
                return this.regions[this.regions.length - 1];
            }

            notifyRegionChange(newRegion, oldRegion, level) {
                if (newRegion.id !== oldRegion.id) {
                    showCombatLog(`🌍 进入新区域: ${newRegion.name} (Lv.${newRegion.levels[0]}-${newRegion.levels[1]})`, 'region-change');
                    showCombatLog(`📖 区域描述: ${newRegion.description || '充满挑战的新领域'}`, 'region-info');
                }
            }
        }

        const regionSystem = new RegionSystem();

    <script>
        class AchievementSystem {
            constructor() {
                this.achievements = {};
                this.initAchievements();
                this.listeners = [];
            }

            initAchievements() {
                const achievementsList = [
                    { id: 'first_blood', name: '第一滴血', description: '首次击杀敌人', category: 'starter', condition: (gs) => gs.kills >= 1 },
                    { id: 'level_ten', name: '第十关勇士', description: '到达第10关', category: 'progression', condition: (gs) => gs.level >= 10 },
                    { id: 'collector_common', name: '平凡收藏家', description: '收集10种不同的普通武器', category: 'collection', condition: (gs) => gs.collectedCommonWeapons >= 10 },
                    { id: 'rare_hunter', name: '稀有猎人', description: '获得第一件稀有武器', category: 'collection', condition: (gs) => gs.rarestWeaponObtained && gs.rarestWeaponObtained.rarity >= 3 },
                    { id: 'legendary_treasure', name: '传说宝藏', description: '获得第一件传说武器', category: 'collection', condition: (gs) => gs.legendaryWeaponsObtained >= 1 },
                    { id: 'century_club', name: '百人俱乐部', description: '到达第100关', category: 'progression', condition: (gs) => gs.level >= 100 }
                ];

                achievementsList.forEach(ach => {
                    this.achievements[ach.id] = {
                        id: ach.id,
                        name: ach.name,
                        description: ach.description,
                        category: ach.category,
                        hidden: ach.hidden || false,
                        unlocked: false,
                        unlockTime: null,
                        progress: 0
                    };
                });
            }

            checkAchievements(gameState) {
                let unlocked = [];

                for (const [id, ach] of Object.entries(this.achievements)) {
                    if (!ach.unlocked) {
                        // 检查条件是否满足
                        const achievementDef = this.getAchievementDefinition(id);
                        if (achievementDef && achievementDef.condition(gameState)) {
                            this.unlockAchievement(id);
                            unlocked.push({ id, name: ach.name, description: ach.description });
                        }
                    }
                }

                if (unlocked.length > 0) {
                    this.onAchievementUnlocked(unlocked);
                }

                return unlocked;
            }

            getAchievementDefinition(id) {
                const achievementsList = [
                    { id: 'first_blood', name: '第一滴血', description: '首次击杀敌人', category: 'starter', condition: (gs) => gs.kills >= 1 },
                    { id: 'level_ten', name: '第十关勇士', description: '到达第10关', category: 'progression', condition: (gs) => gs.level >= 10 },
                    { id: 'collector_common', name: '平凡收藏家', description: '收集10种不同的普通武器', category: 'collection', condition: (gs) => gs.collectedCommonWeapons >= 10 },
                    { id: 'rare_hunter', name: '稀有猎人', description: '获得第一件稀有武器', category: 'collection', condition: (gs) => gs.rarestWeaponObtained && gs.rarestWeaponObtained.rarity >= 3 },
                    { id: 'legendary_treasure', name: '传说宝藏', description: '获得第一件传说武器', category: 'collection', condition: (gs) => gs.legendaryWeaponsObtained >= 1 },
                    { id: 'century_club', name: '百人俱乐部', description: '到达第100关', category: 'progression', condition: (gs) => gs.level >= 100 }
                ];

                return achievementsList.find(a => a.id === id);
            }

            unlockAchievement(id) {
                if (this.achievements[id] && !this.achievements[id].unlocked) {
                    this.achievements[id].unlocked = true;
                    this.achievements[id].unlockTime = Date.now();

                    if (!gameState.achievementCount) gameState.achievementCount = 0;
                    gameState.achievementCount++;

                    console.log(`🏆 成就解锁: ${this.achievements[id].name}`);
                    return true;
                }
                return false;
            }

            onAchievementUnlocked(achievements) {
                this.listeners.forEach(callback => callback(achievements));

                achievements.forEach(achievement => {
                    showCombatLog(`🏆 成就解锁: ${achievement.name}`, 'achievement-unlock');
                    createAchievementNotification(achievement);
                });
            }

            createAchievementNotification(achievement) {
                const notification = document.createElement('div');
                notification.className = 'achievement-notification';
                notification.style.cssText = `
                    position: fixed; top: 20px; right: 20px;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white; padding: 15px 20px; border-radius: 8px;
                    border: 2px solid gold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    z-index: 10000; font-weight: bold; min-width: 250px;
                    text-align: center; animation: slideInRight 0.5s ease-out;
                `;
                notification.innerHTML = `
                    <div style="font-size: 1.2em; margin-bottom: 5px;">🏆 成就解锁!</div>
                    <div style="font-size: 1.1em;">${achievement.name}</div>
                    <div style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">${achievement.description}</div>
                `;

                if (!document.getElementById('achievement-animation-style')) {
                    const style = document.createElement('style');
                    style.id = 'achievement-animation-style';
                    style.textContent = `
                        @keyframes slideInRight {
                            from { transform: translateX(100%); opacity: 0; }
                            to { transform: translateX(0); opacity: 1; }
                        }
                        @keyframes fadeOut {
                            from { opacity: 1; }
                            to { opacity: 0; }
                        }
                    `;
                    document.head.appendChild(style);
                }

                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'fadeOut 1s ease-out';
                    setTimeout(() => {
                        if (notification.parentNode) notification.parentNode.removeChild(notification);
                    }, 1000);
                }, 5000);
            }

            addListener(callback) {
                this.listeners.push(callback);
            }

            getAllAchievements() {
                return this.achievements;
            }

            getUnlockedAchievements() {
                return Object.values(this.achievements).filter(ach => ach.unlocked);
            }

            getStatistics() {
                const allCount = Object.keys(this.achievements).length;
                const unlockedCount = this.getUnlockedAchievements().length;
                return {
                    total: allCount,
                    unlocked: unlockedCount,
                    locked: allCount - unlockedCount,
                    percentage: allCount > 0 ? Math.round((unlockedCount / allCount) * 100) : 0
                };
            }

            saveToLocalStorage() {
                try {
                    const saveData = {};
                    for (const [id, achievement] of Object.entries(this.achievements)) {
                        saveData[id] = {
                            unlocked: achievement.unlocked,
                            unlockTime: achievement.unlockTime,
                            progress: achievement.progress
                        };
                    }
                    localStorage.setItem('game_achievements', JSON.stringify(saveData));
                } catch (e) {
                    console.warn('无法保存成就到本地存储:', e);
                }
            }

            loadFromLocalStorage() {
                try {
                    const savedData = localStorage.getItem('game_achievements');
                    if (savedData) {
                        const parsedData = JSON.parse(savedData);
                        for (const [id, savedAchievement] of Object.entries(parsedData)) {
                            if (this.achievements[id]) {
                                this.achievements[id].unlocked = savedAchievement.unlocked;
                                this.achievements[id].unlockTime = savedAchievement.unlockTime;
                                this.achievements[id].progress = savedAchievement.progress;

                                if (savedAchievement.unlocked && !gameState.achievementCount) {
                                    gameState.achievementCount = 0;
                                }
                            }
                        }
                    }
                } catch (e) {
                    console.warn('无法从本地存储加载成就:', e);
                }
            }
        }

        const achievementSystem = new AchievementSystem();
        achievementSystem.loadFromLocalStorage();

        // 展示成就的函数
        function showAchievements() {
            const unlockedCount = achievementSystem.getUnlockedAchievements().length;
            const totalCount = Object.keys(achievementSystem.getAllAchievements()).length;
            alert(`🏆 游戏成就\n\n已解锁: ${unlockedCount}/${totalCount} (${Math.round((unlockedCount/totalCount)*100)}%)`);
        }
    </script>

    <!-- 存档系统 -->
    <script>
        class SaveSystem {
            constructor() {
                this.saveSlots = 3;
            }

            saveGame(slot = 1, customData = {}) {
                try {
                    const saveData = {
                        gameState: {
                            level: gameState.level,
                            kills: gameState.kills,
                            player: {
                                x: gameState.player.x,
                                y: gameState.player.y,
                                hp: gameState.player.hp,
                                maxHp: gameState.player.maxHp,
                                weapon: gameState.player.weapon
                            },
                            enemies: gameState.enemies.length,
                            playTime: Date.now() - gameState.startTime
                        },
                        achievements: achievementSystem ? achievementSystem.getAllAchievements() : {},
                        timestamp: Date.now(),
                        version: '1.0.0',
                        ...customData
                    };

                    localStorage.setItem(`game_save_slot_${slot}`, JSON.stringify(saveData));
                    console.log(`游戏已保存到槽位 ${slot}`);
                    showCombatLog(`💾 游戏已保存到槽位 ${slot}`, 'system');

                    return true;
                } catch (e) {
                    console.error('保存游戏失败:', e);
                    showCombatLog(`❌ 保存失败: ${e.message}`, 'error');
                    return false;
                }
            }

            loadGame(slot = 1) {
                try {
                    const saveDataStr = localStorage.getItem(`game_save_slot_${slot}`);
                    if (!saveDataStr) {
                        console.log(`槽位 ${slot} 没有存档`);
                        showCombatLog(`❌ 槽位 ${slot} 没有存档`, 'error');
                        return false;
                    }

                    const saveData = JSON.parse(saveDataStr);

                    if (saveData.gameState) {
                        gameState.level = saveData.gameState.level;
                        gameState.kills = saveData.gameState.kills;
                        if (saveData.gameState.player) {
                            gameState.player.x = saveData.gameState.player.x;
                            gameState.player.y = saveData.gameState.player.y;
                            gameState.player.hp = saveData.gameState.player.hp;
                            gameState.player.maxHp = saveData.gameState.player.maxHp;
                            gameState.player.weapon = saveData.gameState.player.weapon;
                        }
                        gameState.enemies = [];
                        gameState.startTime = Date.now() - saveData.gameState.playTime;
                    }

                    if (achievementSystem && saveData.achievements) {
                        for (const [id, achievement] of Object.entries(saveData.achievements)) {
                            if (achievementSystem.achievements[id]) {
                                achievementSystem.achievements[id].unlocked = achievement.unlocked;
                                achievementSystem.achievements[id].unlockTime = achievement.unlockTime;
                                achievementSystem.achievements[id].progress = achievement.progress;
                            }
                        }
                    }

                    console.log(`游戏已从槽位 ${slot} 加载`);
                    showCombatLog(`✅ 游戏已从槽位 ${slot} 加载`, 'system');

                    return true;
                } catch (e) {
                    console.error('加载游戏失败:', e);
                    showCombatLog(`❌ 加载失败: ${e.message}`, 'error');
                    return false;
                }
            }
        }

        const saveSystem = new SaveSystem();
    </script>

    <!-- 战斗日志 -->
    <script>
        function showCombatLog(message, type = 'general') {
            const log = document.getElementById('combat-log');
            if (!log) return;

            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;

            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;

            // 只保留最新的30条消息
            if (log.children.length > 30) {
                log.removeChild(log.firstChild);
            }
        }
    </script>

    <!-- 主游戏逻辑 -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap-canvas');
        const minimapCtx = minimapCanvas.getContext('2d');

        // 鼠标移动监听
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouseX = e.clientX - rect.left;
            gameState.mouseY = e.clientY - rect.top;
        });

        // 游戏控制
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            gameState.player.isPlaying = true;
            gameLoop();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            gameState = {
                player: {
                    x: 400,
                    y: 300,
                    size: 30,
                    speed: 5,
                    hp: 100,
                    maxHp: 100,
                    weapon: null,
                    isPlaying: true,
                    isGameOver: false
                },
                level: 1,
                kills: 0,
                enemies: [],
                mouseX: 400,
                mouseY: 300,
                startTime: Date.now(),
                sessionTime: 0,
                currentKillStreak: 0,
                maxSingleHitDamage: 0,
                regionsDiscovered: 0,
                modesAttempted: 0,
                secretFound: false,
                easterEggsFound: 0,
                achievementCount: 0,
                collectedCommonWeapons: 0,
                legendaryWeaponsObtained: 0,
                mythicWeaponsObtained: 0,
                rarestWeaponObtained: { rarity: 0 }
            };
            document.getElementById('game-over').classList.add('hidden');
            gameLoop();
        });

        document.getElementById('main-menu-btn').addEventListener('click', () => {
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        });

        document.getElementById('load-game-btn').addEventListener('click', () => {
            saveSystem.loadGame(1);
            document.getElementById('start-screen').classList.add('hidden');
            gameState.player.isPlaying = true;
            gameLoop();
        });

        document.getElementById('view-achievements-btn').addEventListener('click', () => {
            showAchievements();
        });

        // 简化的敌人生成
        function spawnEnemy() {
            if (!gameState.player.isPlaying) return;

            const enemyTypes = Object.keys(ENEMY_TYPES);
            const randomType = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
            const baseEnemy = ENEMY_TYPES[randomType];

            const enemy = {
                x: Math.random() < 0.5 ? -20 : canvas.width + 20,
                y: Math.random() * canvas.height,
                size: baseEnemy.size * 10, // 调整大小比例
                speed: baseEnemy.speed,
                hp: baseEnemy.hp * 10, // 基础HP调整
                maxHp: baseEnemy.hp * 10,
                damage: baseEnemy.damage,
                color: `hsl(${Math.random() * 60}, 70%, 50%)`,
                weapon: generateBalancedWeapon(gameState.level, gameState.player),
                type: randomType
            };

            gameState.enemies.push(enemy);

            // 持续生成敌人
            if (gameState.player.isPlaying) {
                const spawnRate = Math.max(500, 2000 - Math.min(1500, gameState.level * 30));
                setTimeout(spawnEnemy, spawnRate);
            }
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.player.isPlaying) return;

            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新玩家位置（跟随鼠标）
            const dx = gameState.mouseX - gameState.player.x;
            const dy = gameState.mouseY - gameState.player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 5) {
                gameState.player.x += (dx / dist) * gameState.player.speed;
            }

            // 边界限制
            gameState.player.x = Math.max(gameState.player.size, Math.min(canvas.width - gameState.player.size, gameState.player.x));
            gameState.player.y = Math.max(gameState.player.size, Math.min(canvas.height - gameState.player.size, gameState.player.y));

            // 绘制玩家
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.size, 0, Math.PI * 2);
            ctx.fill();

            // 绘制当前武器
            if (gameState.player.weapon) {
                ctx.fillStyle = gameState.player.weapon.color;
                ctx.fillRect(gameState.player.x + 20, gameState.player.y - 5, 25, 8);
            }

            // 更新和绘制敌人
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];

                // 敌人朝玩家移动
                const edx = gameState.player.x - enemy.x;
                const edy = gameState.player.y - enemy.y;
                const edist = Math.sqrt(edx * edx + edy * edy);

                enemy.x += (edx / edist) * enemy.speed;
                enemy.y += (edy / edist) * enemy.speed;

                // 检测碰撞
                const collisionDist = gameState.player.size + enemy.size / 3; // 调整敌人大小的处理
                if (edist < collisionDist) {
                    // 玩家受伤
                    const damage = enemy.damage;
                    gameState.player.hp -= damage;

                    if (gameState.player.hp <= 0) {
                        gameState.player.hp = 0;
                        gameState.player.isPlaying = false;
                        gameState.player.isGameOver = true;

                        // 显示游戏结束画面
                        document.getElementById('final-level').textContent = gameState.level;
                        document.getElementById('final-kills').textContent = gameState.kills;
                        document.getElementById('final-time').textContent = Math.floor((Date.now() - gameState.startTime) / 1000);
                        document.getElementById('final-achievements').textContent = gameState.achievementCount;
                        document.getElementById('game-over').classList.remove('hidden');
                        return;
                    }
                }

                // 绘制敌人
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size / 3, 0, Math.PI * 2); // 调整大小比例
                ctx.fill();

                // 血条
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - 15, enemy.y - enemy.size / 3 - 8, 30, 4);
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x - 15, enemy.y - enemy.size / 3 - 8, 30 * hpPercent, 4);

                // 如果敌人死亡
                if (enemy.hp <= 0) {
                    // 获得敌人武器
                    gameState.player.weapon = enemy.weapon;

                    // 更新武器统计
                    if (enemy.weapon.rarity === 'legendary') gameState.legendaryWeaponsObtained++;
                    if (enemy.weapon.rarity === 'mythic') gameState.mythicWeaponsObtained++;

                    // 更新最高稀有度
                    const rarityValues = { 'common': 1, 'uncommon': 2, 'rare': 3, 'epic': 4, 'legendary': 5, 'mythic': 6 };
                    if (rarityValues[enemy.weapon.rarity] > rarityValues[gameState.rarestWeaponObtained.rarity || 'common']) {
                        gameState.rarestWeaponObtained = { rarity: enemy.weapon.rarity };
                    }

                    gameState.kills++;
                    gameState.currentKillStreak++;

                    if (gameState.kills % 10 === 0) {
                        gameState.level++;
                        showCombatLog(`⬆️ 升级到第 ${gameState.level} 关!`, 'level-up');

                        // 检查区域变化
                        const oldRegion = regionSystem.currentRegion;
                        const newRegion = regionSystem.getCurrentRegion(gameState.level);
                        regionSystem.notifyRegionChange(newRegion, oldRegion, gameState.level);
                    }

                    gameState.enemies.splice(i, 1);

                    // 重置连击计数，如果间隔太长
                    setTimeout(() => {
                        if (gameState.currentKillStreak > 0) {
                            gameState.currentKillStreak = 0;
                        }
                    }, 5000);
                }
            }

            // 更新UI
            document.getElementById('hp').textContent = Math.max(0, Math.floor(gameState.player.hp));
            document.getElementById('maxHp').textContent = Math.floor(gameState.player.maxHp);
            document.getElementById('weapon').textContent = gameState.player.weapon ? gameState.player.weapon.name : '无';
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('kills').textContent = gameState.kills;

            // 更新扩展UI
            document.getElementById('current-region').textContent = regionSystem.currentRegion.name;
            document.getElementById('current-mode').textContent = '经典';
            document.getElementById('play-time').textContent = `${Math.floor((Date.now() - gameState.startTime) / 1000)}s`;
            document.getElementById('completion-percent').textContent = `${Math.min(100, Math.floor(gameState.level / 100 * 100))}%`;

            // 检查成就
            achievementSystem.checkAchievements(gameState);

            // 绘制小地图
            drawMinimap();

            // 继续游戏循环
            if (gameState.player.isPlaying) {
                requestAnimationFrame(gameLoop);
            }
        }

        // 绘制小地图
        function drawMinimap() {
            minimapCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);

            // 绘制边界
            minimapCtx.strokeStyle = '#4a4a6a';
            minimapCtx.strokeRect(0, 0, minimapCanvas.width, minimapCanvas.height);

            // 缩放比例
            const scaleX = minimapCanvas.width / canvas.width;
            const scaleY = minimapCanvas.height / canvas.height;

            // 绘制玩家
            minimapCtx.fillStyle = '#4ade80';
            minimapCtx.beginPath();
            minimapCtx.arc(
                gameState.player.x * scaleX,
                gameState.player.y * scaleY,
                3,
                0,
                Math.PI * 2
            );
            minimapCtx.fill();

            // 绘制敌人
            for (const enemy of gameState.enemies) {
                minimapCtx.fillStyle = enemy.color;
                minimapCtx.beginPath();
                minimapCtx.arc(
                    enemy.x * scaleX,
                    enemy.y * scaleY,
                    2,
                    0,
                    Math.PI * 2
                );
                minimapCtx.fill();
            }
        }

        // 开始生成敌人
        setTimeout(spawnEnemy, 1000);

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && gameState.player.isPlaying) {
                // 创建暂停菜单
                const pauseMenu = document.createElement('div');
                pauseMenu.id = 'pause-menu';
                pauseMenu.style.cssText = `
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0, 0, 0, 0.85);
                    color: white;
                    padding: 30px;
                    border-radius: 10px;
                    border: 3px solid #4ade80;
                    z-index: 9999;
                    text-align: center;
                `;

                pauseMenu.innerHTML = `
                    <h2 style="color: #4ade80; margin-top: 0;">游戏已暂停</h2>
                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                        <button onclick="this.closest('#pause-menu').remove()" style="
                            background: #4ade80; color: black; border: none;
                            padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold;
                        ">继续游戏</button>
                        <button onclick="saveSystem.saveGame(1); this.closest('#pause-menu').remove(); document.getElementById('start-screen').classList.remove('hidden');" style="
                            background: #6b7280; color: white; border: none;
                            padding: 12px 30px; border-radius: 5px; cursor: pointer;
                        ">保存并退出</button>
                    </div>
                `;

                document.getElementById('game-container').appendChild(pauseMenu);
            }

            // F1 查看成就
            if (e.key === 'F1' && e.ctrlKey) {
                showAchievements();
            }

            // F5 保存游戏
            if (e.key === 'F5' && e.ctrlKey) {
                e.preventDefault();
                saveSystem.saveGame(1);
            }

            // F9 加载游戏
            if (e.key === 'F9' && e.ctrlKey) {
                e.preventDefault();
                saveSystem.loadGame(1);
            }
        });

        // 定期更新会话时间
        setInterval(() => {
            if (gameState.player.isPlaying) {
                gameState.sessionTime = Math.floor((Date.now() - gameState.startTime) / 1000);
            }
        }, 1000);
    </script>
