<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue游戏 - 集成版本</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f0f1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        h1 {
            color: #4ade80;
            text-align: center;
        }
        
        #gameContainer {
            position: relative;
            margin: 20px auto;
        }
        
        #gameCanvas {
            border: 2px solid #333;
            background-color: #000;
            display: block;
            margin: 0 auto;
        }
        
        .controls {
            margin: 20px 0;
            text-align: center;
        }
        
        button {
            background-color: #4ade80;
            color: black;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #34d399;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            margin: 5px;
        }
        
        .instructions {
            background: rgba(30, 30, 46, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            max-width: 800px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎮 Rogue游戏 - 集成优化版本</h1>
    
    <div class="instructions">
        <p><strong>操作说明:</strong></p>
        <p>WASD 或 方向键 - 移动 | 鼠标 - 控制方向 | 空格键 - 开始/重启游戏 | Q/W/E/R - 技能</p>
    </div>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    
    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn">重新开始</button>
        <button id="validateBtn">运行验证</button>
    </div>
    
    <div class="stats">
        <div class="stat-box">得分: <span id="score">0</span></div>
        <div class="stat-box">生命: <span id="health">100</span></div>
        <div class="stat-box">击杀: <span id="kills">0</span></div>
        <div class="stat-box">等级: <span id="level">1</span></div>
        <div class="stat-box">FPS: <span id="fps">0</span></div>
    </div>

    <!-- 加载优化后的游戏系统 -->
    <script src="./integrated-game-system.js"></script>
    <script src="./main-integrated-game.js"></script>
    <script src="./performance-optimizer-full.js"></script>
    <script src="./validate-integrated-system.js"></script>
    
    <script>
        // 等待所有脚本加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', function() {
            // 检查所有必要组件是否已加载
            if (window.IntegratedGameSystem && window.MainIntegrativeGame) {
                // 初始化游戏
                const game = new MainIntegrativeGame();
                game.init();
                
                // 将游戏实例存储到全局
                window.MainIntegrativeGame = game;
                
                console.log("✅ 游戏系统已成功初始化");
                
                // 绑定UI事件
                document.getElementById('startBtn').addEventListener('click', () => {
                    game.startGame();
                });
                
                document.getElementById('restartBtn').addEventListener('click', () => {
                    game.restartGame();
                });
                
                document.getElementById('validateBtn').addEventListener('click', async () => {
                    console.log("🔍 运行游戏验证...");
                    const results = await runGameValidation();
                    console.log("验证结果:", results);
                    alert(`验证完成! 通过: ${results.passed}, 失败: ${results.failed}`);
                });
                
                // 设置UI更新定时器
                setInterval(() => {
                    if (window.IntegratedGameSystem) {
                        const state = window.IntegratedGameSystem.getState();
                        document.getElementById('score').textContent = state.player.score || 0;
                        document.getElementById('health').textContent = `${state.player.hp}/${state.player.maxHp}`;
                        document.getElementById('kills').textContent = state.kills || 0;
                        document.getElementById('level').textContent = state.level || 1;
                        
                        if (window.IntegratedGameSystem.performanceMonitor) {
                            document.getElementById('fps').textContent = window.IntegratedGameSystem.performanceMonitor.getFPS();
                        }
                    }
                }, 1000);
            } else {
                console.error("❌ 游戏系统组件加载失败");
            }
        });
    </script>
</body>
</html>
