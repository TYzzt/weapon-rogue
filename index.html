<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - Weapon Rogue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- 生命值条 -->
        <div id="health-bar-container" class="health-bar-container">
            <div id="health-bar" class="health-bar" style="width: 100%;"></div>
        </div>

        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ 生命：<span id="hp">150</span>/<span id="maxHp">150</span></div>
                <div>⚔️ 武器：<span id="weapon">无</span></div>
                <div>🏆 关卡：<span id="level">1</span></div>
                <div>🎯 目标：<span id="goal">击杀5敌升级</span></div>
                <div>💀 击杀：<span id="kills">0</span></div>
                <div>🔥 连击：<span id="combo">0</span></div>
                <div>⭐ 分数：<span id="score">0</span></div>
                <div>🌌 里程碑：<span id="milestones">0/14</span></div>
                <div>🔮 BUFF：<span id="buffs">无</span></div>
            </div>
            <div id="inventory">
                <h3>🎒 背包</h3>
                <div id="potions"></div>
                <div id="relics"></div>
            </div>
        </div>

        <!-- 技能冷却指示器 -->
        <div id="skill-cooldown" class="skill-cooldown">
            <div class="skill-indicator" id="q-skill">Q<div class="skill-cooldown-circle" id="q-cooldown"></div></div>
            <div class="skill-indicator" id="w-skill">W<div class="skill-cooldown-circle" id="w-cooldown"></div></div>
            <div class="skill-indicator" id="e-skill">E<div class="skill-cooldown-circle" id="e-cooldown"></div></div>
            <div class="skill-indicator" id="r-skill">R<div class="skill-cooldown-circle" id="r-cooldown"></div></div>
        </div>

        <div id="game-over" class="hidden">
            <h2>游戏结束</h2>
            <p>你到达了第 <span id="final-level">0</span> 关</p>
            <p>击败了 <span id="final-kills">0</span> 个敌人</p>
            <p>最终得分：<span id="final-score">0</span></p>
            <button id="restart-btn">重新开始</button>
        </div>
        <div id="pause-menu" class="hidden">
            <h2>游戏暂停</h2>
            <button id="continue-btn">继续游戏</button>
            <button id="settings-btn">设置</button>
            <button id="main-menu-btn">返回主菜单</button>
        </div>
        <div id="settings-menu" class="hidden">
            <h2>游戏设置</h2>
            <div class="setting-option">
                <label>
                    <input type="checkbox" id="sound-enabled" checked> 音效开启
                </label>
            </div>
            <div class="setting-option">
                <label>
                    <input type="checkbox" id="music-enabled" checked> 音乐开启
                </label>
            </div>
            <div class="setting-option">
                <label>
                    难度: <select id="difficulty-select">
                        <option value="easy">简单</option>
                        <option value="normal" selected>普通</option>
                        <option value="hard">困难</option>
                    </select>
                </label>
            </div>
            <button id="back-to-pause">返回暂停菜单</button>
        </div>
        <div id="start-screen">
            <h1>🗡️ 武器替换者</h1>
            <p class="description">
                敌人掉落的武器<strong>必定替换</strong>你当前的武器<br>
                这可能是好事，也可能是灾难...<br><br>
                收集药水和遗物来改变命运
            </p>
            <button id="start-btn">开始游戏</button>
            <button id="achievements-btn">成就</button>
        </div>
    </div>
    <script src="i18n.js"></script>
    <script src="save-system.js"></script>
    <script src="enhanced-achievements.js"></script>
    <script src="enhanced-audio.js"></script>
    <script src="enhanced-menu.js"></script>
    <script src="enhanced-achievement-logic.js"></script>
    <script src="balance-patch.js"></script>
    <script src="content-expansion.js"></script>
    <script src="milestone-enhancement.js"></script>
    <script src="game.js"></script>
</body>
</html>
