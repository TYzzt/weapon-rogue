<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武器替换者 - Steam增强版 (2026年3月24日更新)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.4);
            border-radius: 12px;
            overflow: hidden;
        }

        #gameCanvas {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            display: block;
            border-radius: 12px;
        }

        #ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #stats {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #4a4a8a;
            font-size: 15px;
            line-height: 1.8;
            backdrop-filter: blur(5px);
        }

        #extended-stats {
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #5a3a7a;
            font-size: 14px;
            line-height: 1.6;
            position: absolute;
            top: 15px;
            right: 15px;
            min-width: 200px;
            backdrop-filter: blur(5px);
        }

        #start-screen, #game-over, #pause-menu, #skill-tree, #settings-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #4a4a6a;
            text-align: center;
            z-index: 100;
            min-width: 400px;
            backdrop-filter: blur(10px);
        }

        #skill-tree, #settings-menu {
            min-width: 500px;
            text-align: left;
            max-height: 80vh;
            overflow-y: auto;
        }

        .skill-category {
            margin-bottom: 20px;
        }

        .skill-item {
            background: rgba(100, 100, 150, 0.3);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skill-item:hover {
            background: rgba(120, 120, 180, 0.5);
            transform: translateX(5px);
        }

        .skill-item.active {
            background: rgba(100, 150, 200, 0.5);
            border: 1px solid #4fc3dc;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            min-width: 150px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        button.secondary {
            background: linear-gradient(135deg, #8e9eab 0%, #eef2f3 100%);
            color: #333;
        }

        .stat-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 5px 0;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #34d399);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        #level-bar .stat-bar-fill {
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
        }

        #xp-bar .stat-bar-fill {
            background: linear-gradient(90deg, #a78bfa, #8b5cf6);
        }

        .hidden {
            display: none !important;
        }

        .combat-log {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .combat-log.show {
            opacity: 1;
        }

        .critical-hit {
            color: #fbbf24;
            font-weight: bold;
            text-shadow: 0 0 10px #fbbf24;
        }

        .heal {
            color: #4ade80;
            text-shadow: 0 0 10px #4ade80;
        }

        .weapon-effect {
            color: #a78bfa;
            text-shadow: 0 0 10px #a78bfa;
        }

        .achievement-unlock {
            color: #f87171;
            text-shadow: 0 0 10px #f87171;
        }

        .lifesteal {
            color: #fb7185;
            text-shadow: 0 0 10px #fb7185;
        }

        .enemy-special {
            color: #f472b6;
            text-shadow: 0 0 10px #f472b6;
        }

        .save-success {
            color: #60a5fa;
            text-shadow: 0 0 10px #60a5fa;
        }

        .save-error {
            color: #f87171;
            text-shadow: 0 0 10px #f87171;
        }

        .load-success {
            color: #34d399;
            text-shadow: 0 0 10px #34d399;
        }

        .load-error {
            color: #f87171;
            text-shadow: 0 0 10px #f87171;
        }

        .skill-ui {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #4a4a6a;
            z-index: 20;
        }

        .skill-point-indicator {
            color: gold;
            font-weight: bold;
            font-size: 18px;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 30;
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(100, 100, 150, 0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="stats">
                <div>❤️ 生命：<span id="hp">100</span>/<span id="maxHp">100</span></div>
                <div id="hp-bar" class="stat-bar"><div class="stat-bar-fill" id="hpFill" style="width: 100%;"></div></div>
                <div>⚔️ 武器：<span id="weapon">无</span></div>
                <div>🏆 关卡：<span id="level">1</span></div>
                <div id="level-bar" class="stat-bar"><div class="stat-bar-fill" id="levelFill" style="width: 0%;"></div></div>
                <div>💀 击杀：<span id="kills">0</span></div>
                <div>💰 分数：<span id="score">0</span></div>
                <div>⭐ 连击：<span id="combo">0</span></div>
                <div id="xp-bar" class="stat-bar"><div class="stat-bar-fill" id="xpFill" style="width: 0%;"></div></div>
            </div>
        </div>

        <!-- 技能UI -->
        <div id="skill-ui" class="skill-ui hidden">
            <div>💎 技能点: <span id="skill-points" class="skill-point-indicator">0</span></div>
            <button id="open-skill-tree" class="secondary">技能树</button>
        </div>

        <!-- 战斗日志 -->
        <div id="combat-log" class="combat-log"></div>

        <!-- 暂停菜单 -->
        <div id="pause-menu" class="hidden">
            <h2>⏸️ 游戏暂停</h2>
            <p>游戏已暂停</p>
            <button id="resume-btn">继续游戏</button>
            <button id="settings-btn-from-pause" class="secondary">设置</button>
            <button id="quit-btn" class="secondary">退出游戏</button>
        </div>

        <!-- 技能树菜单 -->
        <div id="skill-tree" class="hidden">
            <h2>🎯 被动技能树</h2>
            <p>选择你的被动技能来强化角色</p>

            <div class="skill-category">
                <h3>🛡️ 生存类</h3>
                <div class="skill-options-survival"></div>
            </div>

            <div class="skill-category">
                <h3>⚔️ 战斗类</h3>
                <div class="skill-options-combat"></div>
            </div>

            <div class="skill-category">
                <h3>🔍 探索类</h3>
                <div class="skill-options-exploration"></div>
            </div>

            <button id="close-skill-tree">关闭</button>
        </div>

        <!-- 设置菜单 -->
        <div id="settings-menu" class="hidden">
            <h2>⚙️ 游戏设置</h2>

            <div class="settings-option">
                <span>音效:</span>
                <input type="checkbox" id="sound-enabled" checked>
            </div>

            <div class="settings-option">
                <span>音乐:</span>
                <input type="checkbox" id="music-enabled" checked>
            </div>

            <div class="settings-option">
                <span>语言: <select id="language-select"><option value="zh">中文</option><option value="en">English</option></select></span>
            </div>

            <div class="settings-option">
                <span>难度: <select id="difficulty-select"><option value="easy">简单</option><option value="normal">普通</option><option value="hard">困难</option></select></span>
            </div>

            <button id="apply-settings">应用设置</button>
            <button id="close-settings">关闭</button>
        </div>

        <!-- 游戏结束画面 -->
        <div id="game-over" class="hidden">
            <h2>💥 游戏结束</h2>
            <p>你到达了第 <span id="final-level">0</span> 关</p>
            <p>击败了 <span id="final-kills">0</span> 个敌人</p>
            <p>获得了 <span id="final-score">0</span> 分</p>
            <p>最高连击: <span id="final-combo">0</span></p>
            <button id="restart-btn">重新开始</button>
            <button id="main-menu-btn" class="secondary">主菜单</button>
        </div>

        <!-- 开始画面 -->
        <div id="start-screen">
            <h1>🗡️ 武器替换者 - Steam版</h1>
            <p class="description">
                敌人掉落的武器<strong>必定替换</strong>你当前的武器<br>
                这可能是好事，也可能是灾难...<br><br>
                收集药水和遗物来改变命运
            </p>
            <button id="start-btn">开始游戏</button>
            <button id="tutorial-btn" class="secondary">游戏教程</button>
            <button id="settings-btn" class="secondary">游戏设置</button>
        </div>
    </div>

    <!-- 引入游戏脚本 -->
    <script>
        // ==================== 基础游戏系统 ====================
        // (这里包含原来游戏的所有基础功能)

        // 游戏状态
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态对象
        window.gameState = {
            player: {
                x: canvas.width / 2,
                y: canvas.height / 2,
                size: 30,
                speed: 5,
                hp: 150,
                maxHp: 150,
                weapon: null,
                isPlaying: false,
                isGameOver: false,
                score: 0,
                maxCombo: 0,
                combo: 0,
                comboTimer: 0,
                // 新增属性
                damageMultiplier: 1.0,
                damageReduction: 0,
                criticalChance: 0,
                criticalDamage: 2.0,
                lifeStealRatio: 0,
                attackSpeedMultiplier: 1.0,
                comboDecayRate: 1.0,
                currentWeaponDamageBuff: 1.0,
                enemyDamageMultiplier: 1.0,
                passiveSkills: new Set(),
                availableSkillPoints: 0
            },
            level: 1,
            kills: 0,
            score: 0,
            enemies: [],
            mouseX: canvas.width / 2,
            mouseY: canvas.height / 2,
            projectiles: [],
            effects: [],
            // 新增游戏状态
            xp: 0,
            xpToNextLevel: 100,
            lootRarityBoost: false,
            consumableEffectMultiplier: 1.0,
            xpMultiplier: 1.0,
            enemySpawnRate: 1.0,
            lastEnemySpawnTime: 0,
            gameTime: 0
        };

        // 武器库 - 会由后续脚本扩展
        window.WEAPONS = [
            { name: '生锈的刀', damage: 5, rarity: 'common', color: '#888', description: '一把生锈的旧刀' },
            { name: '木棍', damage: 3, rarity: 'common', color: '#8B4513', description: '普通的木棍' },
            { name: '铁剑', damage: 10, rarity: 'uncommon', color: '#silver', description: '一把坚固的铁剑' },
            { name: '秘银剑', damage: 25, rarity: 'rare', color: '#00ffff', description: '闪耀着奇异光芒的秘银剑' },
            { name: '龙息巨剑', damage: 50, rarity: 'legendary', color: '#ff0000', description: '散发着龙的气息的巨剑' },
        ];

        // 鼠标移动监听
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            gameState.mouseX = e.clientX - rect.left;
            gameState.mouseY = e.clientY - rect.top;
        });

        // 键盘监听
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            // ESC键暂停游戏
            if (e.key === 'Escape' && gameState.player.isPlaying && !gameState.player.isGameOver) {
                pauseGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // 暂停游戏
        function pauseGame() {
            gameState.player.isPlaying = false;
            document.getElementById('pause-menu').classList.remove('hidden');
        }

        // 继续游戏
        function resumeGame() {
            gameState.player.isPlaying = true;
            document.getElementById('pause-menu').classList.add('hidden');
            gameLoop();
        }

        // 显示战斗日志
        function showCombatLog(message, type = '') {
            const log = document.getElementById('combat-log');
            log.textContent = message;
            log.className = `combat-log show ${type}`;

            setTimeout(() => {
                log.classList.remove('show');
            }, 2000);
        }

        // 简单的敌人生成
        function spawnEnemy() {
            if (!gameState.player.isPlaying) return;

            // 使用平衡的敌人生成逻辑
            if (window.spawnBalancedEnemy) {
                window.spawnBalancedEnemy();
            } else {
                const enemy = {
                    x: Math.random() < 0.5 ? -20 : canvas.width + 20,
                    y: Math.random() * canvas.height,
                    size: 20 + Math.random() * 20,
                    speed: 1 + Math.random() * 2,
                    hp: 20,
                    maxHp: 20,
                    damage: 5,
                    color: `hsl(${Math.random() * 60}, 70%, 50%)`,
                    weapon: WEAPONS[Math.floor(Math.random() * WEAPONS.length)],
                    type: Math.random() > 0.8 ? 'ELITE' : 'NORMAL', // 20% 概率生成精英敌人
                    lastHitTime: 0,
                    hitCooldown: 1000 // 1秒内不能重复受伤
                };

                gameState.enemies.push(enemy);

                // 持续生成敌人
                if (gameState.player.isPlaying) {
                    // 使用平衡的生成间隔
                    const baseInterval = Math.max(800, 2000 - Math.min(1500, gameState.level * 50));
                    setTimeout(spawnEnemy, baseInterval);
                }
            }
        }

        // 敌人类（用于兼容性）
        class Enemy {
            constructor(level, type = null) {
                this.x = Math.random() < 0.5 ? -20 : canvas.width + 20,
                this.y = Math.random() * canvas.height,
                this.size = 20 + Math.random() * 20,
                this.speed = 1 + Math.random() * 2,
                this.hp = 20,
                this.maxHp = 20,
                this.damage = 5,
                this.color = `hsl(${Math.random() * 60}, 70%, 50%)`,
                this.weapon = WEAPONS[Math.floor(Math.random() * WEAPONS.length)],
                this.type = type || (Math.random() > 0.8 ? 'ELITE' : 'NORMAL'),
                this.lastHitTime = 0,
                this.hitCooldown = 1000,
                this.level = level || gameState.level;
            }
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.player.isPlaying) return;

            // 更新游戏时间
            gameState.gameTime += 16; // 假设每帧16ms

            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景效果
            drawBackground();

            // 更新玩家位置（跟随鼠标）
            const dx = gameState.mouseX - gameState.player.x;
            const dy = gameState.mouseY - gameState.player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist > 5) {
                const moveSpeed = gameState.player.speed * (gameState.player.moveSpeedMultiplier || 1);
                gameState.player.x += (dx / dist) * moveSpeed;
            }

            // 边界限制
            gameState.player.x = Math.max(gameState.player.size, Math.min(canvas.width - gameState.player.size, gameState.player.x));
            gameState.player.y = Math.max(gameState.player.size, Math.min(canvas.height - gameState.player.size, gameState.player.y));

            // 绘制玩家
            ctx.fillStyle = '#4ade80';
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.size, 0, Math.PI * 2);
            ctx.fill();

            // 绘制当前武器
            if (gameState.player.weapon) {
                ctx.fillStyle = gameState.player.weapon.color;
                ctx.fillRect(gameState.player.x + 20, gameState.player.y - 5, 25, 8);
            }

            // 更新和绘制敌人
            for (let i = gameState.enemies.length - 1; i >= 0; i--) {
                const enemy = gameState.enemies[i];

                // 敌人朝玩家移动
                const edx = gameState.player.x - enemy.x;
                const edy = gameState.player.y - enemy.y;
                const edist = Math.sqrt(edx * edx + edy * edy);

                if (edist > 0) {
                    enemy.x += (edx / edist) * enemy.speed;
                    enemy.y += (edy / edist) * enemy.speed;
                }

                // 检测碰撞
                const collisionDist = gameState.player.size + enemy.size;
                if (edist < collisionDist) {
                    const now = Date.now();
                    if (now - enemy.lastHitTime > enemy.hitCooldown) {
                        // 玩家受伤
                        let damage = enemy.damage;

                        // 应用伤害减免
                        if (gameState.player.damageReduction > 0) {
                            damage = Math.max(1, Math.floor(damage * (1 - gameState.player.damageReduction)));
                        }

                        gameState.player.hp -= damage;
                        enemy.lastHitTime = now;

                        if (typeof showCombatLog !== 'undefined') {
                            showCombatLog(`OUCH! 受到 ${damage} 点伤害`, 'heal');
                        }

                        if (gameState.player.hp <= 0) {
                            gameState.player.hp = 0;
                            gameState.player.isPlaying = false;
                            gameState.player.isGameOver = true;

                            document.getElementById('final-level').textContent = gameState.level;
                            document.getElementById('final-kills').textContent = gameState.kills;
                            document.getElementById('final-score').textContent = gameState.score;
                            document.getElementById('final-combo').textContent = gameState.player.maxCombo;
                            document.getElementById('game-over').classList.remove('hidden');
                            return;
                        }
                    }
                }

                // 绘制敌人
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
                ctx.fill();

                // 血条
                const hpPercent = enemy.hp / enemy.maxHp;
                ctx.fillStyle = '#333';
                ctx.fillRect(enemy.x - 20, enemy.y - enemy.size - 10, 40, 6);
                ctx.fillStyle = '#f00';
                ctx.fillRect(enemy.x - 20, enemy.y - enemy.size - 10, 40 * hpPercent, 6);

                // 如果敌人死亡
                if (enemy.hp <= 0) {
                    // 获得敌人武器
                    gameState.player.weapon = enemy.weapon;

                    // 增加击杀数和分数
                    gameState.kills++;
                    const killScore = enemy.type === 'ELITE' ? 20 : 10;
                    gameState.score += killScore * gameState.level;
                    gameState.player.score += killScore * gameState.level;

                    // 更新连击
                    gameState.player.combo++;
                    gameState.player.maxCombo = Math.max(gameState.player.maxCombo, gameState.player.combo);

                    // 增加经验值
                    const xpGain = 5 * (enemy.type === 'ELITE' ? 2 : 1);
                    gameState.xp += Math.floor(xpGain * (gameState.xpMultiplier || 1));

                    // 检查升级
                    if (gameState.xp >= gameState.xpToNextLevel) {
                        gameState.level++;
                        gameState.xp = gameState.xp - gameState.xpToNextLevel;
                        gameState.xpToNextLevel = Math.floor(gameState.xpToNextLevel * 1.5);

                        // 奖励生命值
                        gameState.player.maxHp += 10;
                        gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 20);

                        if (typeof showCombatLog !== 'undefined') {
                            showCombatLog(`🎉 升级! 第 ${gameState.level} 关`, 'heal');
                        }
                    }

                    // 获得技能点（每升5级）
                    if (gameState.level % 5 === 0) {
                        gameState.player.availableSkillPoints++;
                        if (typeof showCombatLog !== 'undefined') {
                            showCombatLog(`💎 获得技能点!`, 'achievement-unlock');
                        }
                    }

                    // 有机会掉落道具
                    if (Math.random() < 0.3) {
                        // 这里可以添加道具掉落逻辑
                    }

                    // 从数组中移除敌人
                    gameState.enemies.splice(i, 1);
                }
            }

            // 更新UI
            document.getElementById('hp').textContent = Math.max(0, Math.floor(gameState.player.hp));
            document.getElementById('maxHp').textContent = gameState.player.maxHp;
            document.getElementById('weapon').textContent = gameState.player.weapon ? gameState.player.weapon.name : '无';
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('kills').textContent = gameState.kills;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('combo').textContent = gameState.player.combo;

            // 更新血条
            const hpPercent = Math.max(0, gameState.player.hp / gameState.player.maxHp);
            document.getElementById('hpFill').style.width = `${hpPercent * 100}%`;

            // 更新等级进度条
            const levelPercent = gameState.xp / gameState.xpToNextLevel;
            document.getElementById('xpFill').style.width = `${Math.min(100, levelPercent * 100)}%`;

            // 更新连击计时器
            if (gameState.player.combo > 0) {
                gameState.player.comboTimer += 16; // 每帧16ms
                const comboDecayThreshold = 5000; // 5秒无击杀则重置连击

                // 应用连击衰减减慢效果
                const effectiveThreshold = comboDecayThreshold / (gameState.player.comboDecayRate || 1);

                if (gameState.player.comboTimer > effectiveThreshold) {
                    gameState.player.combo = 0;
                    gameState.player.comboTimer = 0;
                }
            }

            // 继续游戏循环
            if (gameState.player.isPlaying) {
                requestAnimationFrame(gameLoop);
            }
        }

        function drawBackground() {
            // 绘制动态渐变背景
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height)/2
            );
            gradient.addColorStop(0, 'rgba(20, 30, 60, 0.8)');
            gradient.addColorStop(1, 'rgba(10, 15, 30, 0.8)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = 'rgba(100, 100, 150, 0.1)';
            ctx.lineWidth = 1;

            // 垂直线
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // 水平线
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // 按钮事件监听器
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').classList.add('hidden');
            gameState.player.isPlaying = true;
            gameState.player.isGameOver = false;

            // 显示技能UI
            document.getElementById('skill-ui').classList.remove('hidden');

            // 开始游戏循环
            gameLoop();

            // 开始生成敌人
            setTimeout(spawnEnemy, 1000);
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            // 重置游戏状态
            gameState = {
                player: {
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    size: 30,
                    speed: 5,
                    hp: 150,
                    maxHp: 150,
                    weapon: null,
                    isPlaying: true,
                    isGameOver: false,
                    score: 0,
                    maxCombo: 0,
                    combo: 0,
                    comboTimer: 0,
                    damageMultiplier: 1.0,
                    damageReduction: 0,
                    criticalChance: 0,
                    criticalDamage: 2.0,
                    lifeStealRatio: 0,
                    attackSpeedMultiplier: 1.0,
                    comboDecayRate: 1.0,
                    currentWeaponDamageBuff: 1.0,
                    enemyDamageMultiplier: 1.0,
                    passiveSkills: new Set(),
                    availableSkillPoints: 0
                },
                level: 1,
                kills: 0,
                score: 0,
                enemies: [],
                mouseX: canvas.width / 2,
                mouseY: canvas.height / 2,
                projectiles: [],
                effects: [],
                xp: 0,
                xpToNextLevel: 100,
                lootRarityBoost: false,
                consumableEffectMultiplier: 1.0,
                xpMultiplier: 1.0,
                enemySpawnRate: 1.0,
                lastEnemySpawnTime: 0,
                gameTime: 0
            };

            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('skill-ui').classList.remove('hidden');

            // 重新开始游戏循环
            gameLoop();

            // 重新开始生成敌人
            setTimeout(spawnEnemy, 1000);
        });

        document.getElementById('resume-btn').addEventListener('click', resumeGame);
        document.getElementById('quit-btn').addEventListener('click', () => {
            gameState.player.isPlaying = false;
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        });

        document.getElementById('main-menu-btn').addEventListener('click', () => {
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('skill-ui').classList.add('hidden');

            // 重置游戏状态（不包括存档数据）
            gameState.player.isPlaying = false;
            gameState.player.isGameOver = false;
        });

        // 技能树按钮
        document.getElementById('open-skill-tree').addEventListener('click', () => {
            document.getElementById('skill-tree').classList.remove('hidden');
            updateSkillTreeUI();
        });

        document.getElementById('close-skill-tree').addEventListener('click', () => {
            document.getElementById('skill-tree').classList.add('hidden');
        });

        // 设置菜单按钮
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-menu').classList.remove('hidden');
        });

        document.getElementById('settings-btn-from-pause').addEventListener('click', () => {
            document.getElementById('pause-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.remove('hidden');
        });

        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-menu').classList.add('hidden');
        });

        document.getElementById('apply-settings').addEventListener('click', () => {
            // 这里处理设置保存逻辑
            document.getElementById('settings-menu').classList.add('hidden');
        });

        // 更新技能树UI
        function updateSkillTreeUI() {
            if (!window.passiveSkillSystem) return;

            const survivalContainer = document.querySelector('.skill-options-survival');
            const combatContainer = document.querySelector('.skill-options-combat');
            const explorationContainer = document.querySelector('.skill-options-exploration');

            // 清空容器
            [survivalContainer, combatContainer, explorationContainer].forEach(container => {
                container.innerHTML = '';
            });

            // 获取各类技能
            const survivalSkills = window.passiveSkillSystem.getSkillsByCategory('survival');
            const combatSkills = window.passiveSkillSystem.getSkillsByCategory('combat');
            const explorationSkills = window.passiveSkillSystem.getSkillsByCategory('exploration');

            // 渲染技能选项
            const renderSkills = (container, skills) => {
                skills.forEach(skill => {
                    const skillElement = document.createElement('div');
                    skillElement.className = `skill-item ${window.passiveSkillSystem.getActiveSkills().includes(skill.id) ? 'active' : ''}`;
                    skillElement.innerHTML = `
                        <strong>${skill.name}</strong> (T${skill.tier})
                        <div>${skill.description}</div>
                    `;
                    skillElement.addEventListener('click', () => {
                        if (window.passiveSkillSystem.getActiveSkills().includes(skill.id)) {
                            window.passiveSkillSystem.deactivateSkill(skill.id);
                        } else if (gameState.player.availableSkillPoints > 0) {
                            if (window.passiveSkillSystem.activateSkill(skill.id)) {
                                gameState.player.availableSkillPoints--;
                                updateSkillTreeUI(); // 更新UI显示
                            }
                        }
                        updateSkillUI();
                    });
                    container.appendChild(skillElement);
                });
            };

            renderSkills(survivalContainer, survivalSkills);
            renderSkills(combatContainer, combatSkills);
            renderSkills(explorationContainer, explorationSkills);

            // 更新技能点显示
            document.getElementById('skill-points').textContent = gameState.player.availableSkillPoints;
        }

        // 更新技能UI
        function updateSkillUI() {
            if (document.getElementById('skill-points')) {
                document.getElementById('skill-points').textContent = gameState.player.availableSkillPoints;
            }
        }
    </script>
